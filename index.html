<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>EOD Allstars · Fullout Tracker</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Caveat:wght@500;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0efed;--surface:#f7f6f4;--panel:#ebebea;
  --border:#d8d7d5;--border2:#c8c7c5;
  --stone:#8a8a88;--ink:#1a1a1a;--ink-lt:#4a4a48;
  --putty:#9a9a98;--red:#b33a2d;--white:#fafafa;
  --green:#2d7a52;--orange:#c47a1a;--pink:#c4559a;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--ink);}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;width:100%;flex:1;min-height:0;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}
.topbar{background:var(--ink);display:flex;align-items:center;padding:0 20px;height:56px;flex-shrink:0;gap:12px;}
.topbar-logo{height:44px;width:auto;}
.topbar-wordmark{font-family:'DM Serif Display',serif;font-size:21px;font-style:italic;color:#f0efed;}
.topbar-sub{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555;}
.sync-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;}
.sync-dot.ok{background:#4a9d6f;}.sync-dot.err{background:#b33a2d;}.sync-dot.busy{background:#c4a44a;animation:pulse 1s infinite;}
.sync-lbl{font-size:9px;color:#555;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.backbar{background:var(--ink);display:flex;align-items:center;padding:0 16px;height:44px;flex-shrink:0;gap:10px;}
.back-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:#666;padding:0;}
.back-btn:hover{color:#bbb;}
.backbar-title{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:#ccc;}
.backbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pill-btn{padding:5px 13px;background:transparent;border:1px solid #3a3a3a;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:#999;cursor:pointer;}
.pill-btn:hover,.pill-btn.dark{background:rgba(255,255,255,.09);border-color:#555;color:#ccc;}
.home-content{flex:1;overflow-y:auto;padding:28px 24px 60px;}
.teams-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.team-tile{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0;transition:all .15s;overflow:hidden;}
.team-tile:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.07);}
.team-tile img{width:100%;max-width:140px;height:auto;object-fit:contain;}
.team-abbr-fb{width:70px;height:70px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;font-style:italic;color:white;}
.all-tile{background:var(--ink);border:1px solid #2a2a2a;border-radius:14px;padding:20px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .15s;text-align:center;}
.all-tile:hover{background:#252525;transform:translateY(-2px);}
.all-icon{width:64px;height:64px;border-radius:50%;background:#222;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:24px;}
.all-name{font-size:11px;font-weight:600;color:#ddd;letter-spacing:1px;text-transform:uppercase;}
.all-sub{font-size:10px;color:#555;}
.team-body{flex:1;display:flex;min-height:0;overflow:hidden;}
.team-nav{width:190px;flex-shrink:0;background:var(--ink);padding:14px;display:flex;flex-direction:column;overflow-y:auto;}
.team-logo-sidebar{width:140px;margin:0 auto 16px;display:block;}
.team-nav-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#555;text-align:left;padding:9px 0;border-bottom:1px solid #222;width:100%;}
.team-nav-btn.active{color:#ccc;}
.team-content{flex:1;display:flex;min-height:0;overflow:hidden;}
.fo-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.fo-left{width:190px;flex-shrink:0;background:#111;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;border-right:1px solid #222;}
.fo-right{flex:1;background:var(--bg);overflow-y:auto;padding:18px 22px 60px;}
.fo-session-row{background:rgba(255,255,255,.04);border:1px solid #222;border-radius:8px;padding:9px 11px;cursor:pointer;margin-bottom:6px;}
.fo-session-row.active,.fo-session-row:hover{background:rgba(255,255,255,.1);border-color:#3a3a3a;}
.fo-session-date{font-family:'DM Serif Display',serif;font-size:13px;font-style:italic;color:#bbb;}
.fo-session-cnt{font-size:10px;color:#444;margin-top:2px;}
.add-fo-btn{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid #2a2a2a;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:#aaa;cursor:pointer;}
.fo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.fo-card-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);}
.fo-card-title{font-family:'DM Serif Display',serif;font-size:17px;font-style:italic;}
.fo-card-body{padding:14px;display:flex;flex-direction:column;gap:12px;}
.fo-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:5px;}
.fo-inp{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.fo-ta{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
.ded-row{display:flex;flex-direction:column;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);}
.ded-top{display:flex;align-items:center;gap:6px;}
.ded-tag{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--ink-lt);white-space:nowrap;}
.ded-pts{font-size:11px;font-weight:700;color:var(--red);}
.ded-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 6px;margin-left:auto;}
.ded-rem:hover{color:var(--red);}
.ded-desc{width:100%;padding:5px 8px;background:var(--panel);border:1px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink);outline:none;}
.ded-total{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--panel);border-top:1px solid var(--border);}
.add-ded-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--stone);cursor:pointer;}
.ded-menu{position:absolute;top:100%;left:0;z-index:200;background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:230px;overflow:hidden;margin-top:4px;}
.ded-menu-hd{padding:5px 12px;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);background:var(--panel);border-bottom:1px solid var(--border);}
.ded-menu-opt{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--ink);display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}
.ded-menu-opt:last-child{border-bottom:none;}
.ded-menu-opt:hover{background:var(--panel);}
.opt-pts{font-size:11px;font-weight:700;color:var(--red);}
.prob-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);}
.prob-item:last-child{border-bottom:none;}
.prob-chk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.prob-chk.done{background:var(--pink);border-color:var(--pink);}
.prob-chk.done::after{content:'';width:4px;height:8px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.prob-txt{flex:1;font-size:12px;color:var(--ink);}
.prob-item.done .prob-txt{text-decoration:line-through;color:var(--stone);}
.prob-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:10px;padding:2px 4px;margin-left:auto;}
.add-row{display:flex;gap:8px;margin-bottom:14px;}
.add-inp{flex:1;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.add-btn{padding:8px 14px;background:var(--ink);color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;}
.cl-item.done{opacity:.55;}
.chk-box{width:20px;height:20px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.chk-box.ticked{background:var(--pink);border-color:var(--pink);}
.chk-box.ticked::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.cl-text{flex:1;font-size:12px;line-height:1.4;}
.cl-item.done .cl-text{text-decoration:line-through;color:var(--stone);}
.cl-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 6px;}
.builder-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.builder-left{width:240px;flex-shrink:0;background:var(--ink);overflow-y:auto;}
.builder-right{flex:1;background:var(--surface);overflow-y:auto;}
.builder-left .lbl{color:#555;}
.prog-track{height:4px;background:#2a2a2a;border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;transition:width .3s;}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;color:#666;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.cat-chip{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:8px 4px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--ink-lt);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;line-height:1.2;}
.cat-chip.sel{background:var(--white);border-color:var(--ink);color:var(--ink);font-weight:600;}
.cat-ic{font-size:11px;color:var(--putty);}
.bsec{border:1px solid var(--border);border-radius:8px;padding:11px;display:flex;flex-direction:column;gap:9px;background:var(--white);margin-bottom:9px;}
.bsec-top{display:flex;justify-content:space-between;align-items:center;}
.bsec-lft{display:flex;align-items:center;gap:7px;}
.bsec-num{font-family:'DM Serif Display',serif;font-size:15px;font-style:italic;color:var(--putty);}
.bsec-lbl{font-size:12px;font-weight:600;}
.bsec-acts{display:flex;gap:4px;}
.ic-btn{width:24px;height:24px;background:var(--panel);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:9px;color:var(--stone);display:flex;align-items:center;justify-content:center;}
.ic-btn:disabled{opacity:.2;cursor:not-allowed;}
.ic-btn.danger{color:var(--red);}
.tchips{display:flex;flex-wrap:wrap;gap:4px;}
.tchip{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--ink-lt);cursor:pointer;}
.tchip.sel{background:var(--ink);border-color:var(--ink);color:white;font-weight:600;}
.dark-inp{width:100%;padding:8px 10px;background:#222;border:1px solid #3a3a3a;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:#ddd;outline:none;height:36px;}
.ta{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
.ta::placeholder{color:var(--stone);opacity:.6;}
.btn-outline{width:100%;padding:9px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;}
.btn-outline:disabled{opacity:.3;cursor:not-allowed;}
.lbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);display:block;}
.lbl-xs{font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);}
.panel{padding:18px;display:flex;flex-direction:column;gap:14px;}
.field-block{display:flex;flex-direction:column;gap:7px;}
.plan-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.plan-sidebar{width:210px;flex-shrink:0;background:var(--ink);overflow-y:auto;}
.plan-sidebar .lbl{color:#555;}
.plan-main{flex:1;background:var(--bg);overflow-y:auto;}
.plan-inner{padding:16px 18px 60px;display:flex;flex-direction:column;gap:12px;}
.attend-list{display:flex;flex-direction:column;gap:3px;margin-top:5px;}
.attend-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;cursor:pointer;user-select:none;border:1px solid transparent;}
.attend-item.on{background:#1e1e1e;border-color:#2e2e2e;}
.tick{width:14px;height:14px;border:1.5px solid #3a3a3a;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#666;font-weight:700;flex-shrink:0;}
.attend-item.on .tick{border-color:var(--pink);color:var(--pink);}
.aname{font-size:11px;color:#777;}
.attend-item.on .aname{color:#bbb;}
.plan-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.plan-block.active-timer{border-color:var(--pink);box-shadow:0 0 0 2px rgba(196,85,154,.2);}
.plan-block-hd{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;background:var(--panel);border-bottom:1px solid var(--border);}
.blk-lft{display:flex;align-items:center;gap:8px;}
.blk-num{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:var(--border2);}
.blk-title{font-size:13px;font-weight:600;}
.dur-tag{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);background:var(--white);border:1px solid var(--border);border-radius:100px;padding:2px 9px;}
.plan-block-body{display:flex;flex-direction:column;}
.plan-field{padding:8px 13px;border-bottom:1px solid var(--border);}
.plan-field:last-child{border-bottom:none;}
.plan-field-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:5px;}
.detail-text{font-size:12px;color:var(--ink-lt);line-height:1.5;}
.stunt-tbl{border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.stunt-tbl-hd{display:grid;grid-template-columns:1fr 64px 64px;padding:5px 10px;background:var(--panel);border-bottom:1px solid var(--border);}
.stunt-tbl-hd span{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:center;}
.stunt-tbl-hd span:first-child{text-align:left;}
.stunt-tbl-row{display:grid;grid-template-columns:1fr 64px 64px;align-items:center;padding:5px 10px;border-top:1px solid var(--border);}
.stunt-inp{width:54px;padding:4px 5px;background:var(--panel);border:1px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink);text-align:center;outline:none;display:block;margin:0 auto;}
.plan-ta{width:100%;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
.end-mark{text-align:center;padding:24px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--border);}
.analytics-body{flex:1;overflow-y:auto;padding:20px 24px 60px;}
.analytics-title{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;margin-bottom:3px;}
.analytics-sub{font-size:11px;color:var(--stone);margin-bottom:12px;}
.pct-bar-wrap{background:var(--border);border-radius:100px;height:5px;overflow:hidden;flex:1;min-width:40px;}
.pct-bar{height:100%;border-radius:100px;}
.fo-session-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.fo-session-card-hd{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--panel);border-bottom:1px solid var(--border);}
.fo-fo-hd{padding:6px 14px;background:var(--ink);color:#ddd;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #333;}
.fo-ded-line{padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-lt);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:4px 8px;}
.del-btn:hover{color:var(--red);}
.no-data{font-size:12px;color:var(--stone);font-style:italic;padding:8px 0;}
/* TIMER */
.timer-bar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid #2a2a2a;}
.timer-display{font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:white;min-width:80px;}
.timer-display.warning{color:#e8b84b;}
.timer-display.done{color:var(--pink);}
.timer-btn{padding:6px 14px;border:1px solid #3a3a3a;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:#999;background:transparent;cursor:pointer;}
.timer-btn:hover{background:rgba(255,255,255,.09);color:#ddd;}
.timer-btn.active{background:var(--pink);border-color:var(--pink);color:white;}
.timer-label{font-size:10px;color:#555;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.free-timer-inp{width:70px;padding:4px 8px;background:#222;border:1px solid #3a3a3a;border-radius:5px;font-family:'DM Serif Display',serif;font-size:16px;color:#ddd;text-align:center;outline:none;}
.section-timer-btn{padding:4px 10px;border:1px solid var(--border);border-radius:100px;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;color:var(--stone);background:transparent;cursor:pointer;white-space:nowrap;}
.section-timer-btn.running{background:var(--pink);border-color:var(--pink);color:white;}
.section-timer-countdown{font-size:11px;font-weight:700;color:var(--pink);min-width:40px;text-align:right;}
/* TERM CALENDAR */
.term-header{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--border);}
.cal-week-col{text-align:center;padding:5px 4px;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--stone);border-right:1px solid var(--border);}
.cal-dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.1);}
.cal-dot.green{background:#2d7a52;}
.cal-dot.orange{background:#c47a1a;}
.cal-dot.red{background:#b33a2d;}
.cal-dot.empty{background:var(--border);}
/* LAST SESSION NOTES */
.last-session-box{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;margin-bottom:4px;}
.last-session-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:5px;}
.last-session-text{font-size:11px;color:#666;line-height:1.5;font-style:italic;}
.last-session-date{font-size:9px;color:#444;margin-top:4px;}
/* PINK PANTHERS STUNT TRACKER */
.pp-stunt-tile{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:24px 20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:all .2s;}
.pp-stunt-tile:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--pink);}
.pp-stunt-tile:active{transform:scale(.97);}
.pp-stunt-num{font-family:'DM Serif Display',serif;font-size:32px;font-style:italic;color:var(--pink);line-height:1;}
.pp-stunt-label{font-size:16px;font-weight:700;color:var(--ink);}
.pp-stunt-desc{font-size:11px;color:var(--stone);line-height:1.4;}
.pp-group-tile{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:all .2s;}
.pp-group-tile:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08);border-color:var(--pink);}
.pp-group-initial{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#e91e8c,#9b59b6);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:28px;font-style:italic;color:white;}
.pp-group-name{font-size:15px;font-weight:700;color:var(--ink);}
.pp-counter-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;}
.pp-counter-btn:active{transform:scale(.9);}
.pp-hit-rate{font-family:'DM Serif Display',serif;font-size:52px;font-style:italic;text-align:center;line-height:1;}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* ════════════ PINK PANTHERS — fancy home + sub-pages ════════════ */
@font-face{font-family:'Bagel Fat One';font-display:swap;}

/* PP-only — big screen detection. The StanbyME is 1920×1080. Anything ≥ 1400px treats this
   as a "gym screen" and bumps touch targets + type sizes so it's tappable from arm's length. */
@media (min-width: 1400px){
  .pp-bigscreen-scope{ font-size: 18px; }
  .pp-bigscreen-scope .pp-tile{ min-height: 240px; }
  .pp-bigscreen-scope .pp-tile-title{ font-size: 32px !important; }
  .pp-bigscreen-scope .pp-tile-icon{ font-size: 60px !important; }
  .pp-bigscreen-scope .pp-tile-sub{ font-size: 14px !important; }
  .pp-bigscreen-scope .pp-fo-hit-btn,
  .pp-bigscreen-scope .pp-fo-miss-btn{ font-size: 14px; padding: 12px 20px; }
  .pp-bigscreen-scope .pp-fo-flyer{ font-size: 32px; }
  .pp-bigscreen-scope .pp-wordmark{ font-size: 92px !important; }
  .pp-bigscreen-scope .pp-counter-num{ font-size: 96px !important; }
  .pp-bigscreen-scope .pp-counter-btn{ width: 90px !important; height: 90px !important; font-size: 32px !important; }
  .pp-bigscreen-scope .pp-star-row{ font-size: 22px !important; }
  .pp-bigscreen-scope .pp-house-pts{ font-size: 96px !important; }
  .pp-bigscreen-scope .pp-house-add{ font-size: 16px !important; padding: 14px 22px !important; }
  .pp-bigscreen-scope .pp-timer-digits{ font-size: 96px !important; }
}

/* Animated soft-pink gradient background for the PP home */
@keyframes ppHueDrift{
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.pp-gradient-bg{
  background: linear-gradient(120deg, #ffeaf5 0%, #fce7ff 25%, #ffe6f0 50%, #f5e1ff 75%, #ffeaf5 100%);
  background-size: 400% 400%;
  animation: ppHueDrift 18s ease-in-out infinite;
}

/* Drifting sparkle particles in the background */
@keyframes ppSparkleDrift{
  0%   { transform: translate(0,0) scale(0.4) rotate(0deg); opacity: 0; }
  20%  { opacity: 0.6; }
  80%  { opacity: 0.6; }
  100% { transform: translate(var(--dx,40px), var(--dy,-80px)) scale(1) rotate(180deg); opacity: 0; }
}
.pp-sparkle{
  position: absolute; pointer-events: none; color: #e91e8c;
  font-size: 14px; opacity: 0;
  animation: ppSparkleDrift var(--dur,7s) ease-in-out infinite;
  animation-delay: var(--delay,0s);
}

/* The big italic wordmark */
.pp-wordmark{
  font-family: 'Bagel Fat One', 'DM Serif Display', sans-serif;
  font-size: 56px;
  text-align: center;
  line-height: 0.95;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #1a1a1a 0%, #6b1a4a 60%, #c4559a 100%);
  background-clip: text; -webkit-background-clip: text;
  color: transparent; -webkit-text-fill-color: transparent;
  letter-spacing: 0;
}
.pp-tagline{
  font-family: 'Caveat', cursive;
  text-align: center;
  font-size: 22px;
  color: #c4559a;
  margin-bottom: 24px;
  transform: rotate(-1deg);
}

/* Tile grid + tile styles. Each tile gets its own accent via --tile-accent. */
.pp-tile-grid{
  display: grid;
  gap: 14px;
  max-width: 760px;
  margin: 0 auto 18px;
}
.pp-tile-grid.row-primary{ grid-template-columns: 1fr 1fr; }
.pp-tile-grid.row-secondary{ grid-template-columns: 1fr 1fr 1fr; }

.pp-tile{
  position: relative;
  background: white;
  border: 2px solid var(--tile-accent, #d8d7d5);
  border-radius: 18px;
  padding: 22px 18px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  -webkit-tap-highlight-color: rgba(196,85,154,0.15);
  touch-action: manipulation;
  transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  min-height: 140px;
  overflow: hidden;
}
.pp-tile:hover{ transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196,85,154,0.18); }
.pp-tile:active{ transform: scale(0.95); }
@keyframes ppTileBounce{
  0%   { transform: scale(1); }
  35%  { transform: scale(0.93) rotate(-1.5deg); }
  60%  { transform: scale(1.04) rotate(1deg); }
  100% { transform: scale(1) rotate(0); }
}
.pp-tile.bouncing{ animation: ppTileBounce 0.5s ease-out; }

@keyframes ppPulse{
  0%,100% { box-shadow: 0 2px 12px rgba(0,0,0,0.05), 0 0 0 0 rgba(196,85,154,0.5); }
  50%     { box-shadow: 0 2px 12px rgba(0,0,0,0.05), 0 0 0 14px rgba(196,85,154,0); }
}
.pp-tile.pp-pulse{ animation: ppPulse 1.6s ease-in-out infinite; }

.pp-tile-icon{ font-size: 38px; line-height: 1; }
.pp-tile-title{
  font-family: 'Bagel Fat One', 'DM Serif Display', sans-serif;
  font-size: 22px; line-height: 1; color: var(--ink);
  letter-spacing: 0.5px;
}
.pp-tile-sub{ font-size: 11px; color: var(--stone); letter-spacing: 0.5px; }

/* "Big" version for the two primary tiles */
.pp-tile.big{ min-height: 180px; padding: 26px 18px; }
.pp-tile.big .pp-tile-icon{ font-size: 52px; }
.pp-tile.big .pp-tile-title{ font-size: 26px; }

/* Mute toggle in the corner of PP home */
.pp-mute-btn{
  position: absolute; top: 12px; right: 12px;
  background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  border: 1px solid rgba(196,85,154,0.25); border-radius: 100px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s;
  z-index: 5;
}
.pp-mute-btn:active{ transform: scale(0.9); }

/* ── Star Chart ── */
.pp-star-row{
  display: grid; grid-template-columns: 36px 1fr auto auto; align-items: center;
  gap: 12px; padding: 10px 14px; background: white;
  border: 1px solid #f0d4e4; border-radius: 12px;
  margin-bottom: 6px;
  transition: box-shadow 0.3s, border-color 0.3s;
}
.pp-star-row.glow{
  border-color: gold;
  box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.25), 0 4px 18px rgba(255, 215, 0, 0.4);
}
.pp-star-avatar{
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #e91e8c, #9b59b6);
  color: white; font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
.pp-star-name{
  font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; color: var(--ink);
}
.pp-star-count{
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Serif Display', serif; font-style: italic; font-size: 18px; color: #c47a1a;
}
.pp-star-count .stars-vis{ display: inline-flex; gap: 1px; font-size: 14px; }
.pp-star-add{
  background: linear-gradient(135deg, #ffd86b, #f4a82c);
  color: white; border: none; border-radius: 100px;
  padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px; cursor: pointer;
  box-shadow: 0 3px 10px rgba(244, 168, 44, 0.35);
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s;
}
.pp-star-add:active{ transform: scale(0.9); }

/* Animated star that flies into the slot */
@keyframes ppStarFly{
  0%   { transform: translate(0,0) scale(0.6) rotate(0); opacity: 0; }
  20%  { opacity: 1; }
  60%  { transform: translate(var(--end-x,0), var(--end-y,-30px)) scale(1.4) rotate(180deg); }
  100% { transform: translate(var(--end-x,0), var(--end-y,-30px)) scale(0) rotate(360deg); opacity: 0; }
}
.pp-flying-star{
  position: fixed; pointer-events: none; z-index: 10001;
  font-size: 28px; color: gold;
  animation: ppStarFly 0.9s ease-out forwards;
  text-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
}
@keyframes ppStarTrail{
  0%   { transform: scale(0.4); opacity: 1; }
  100% { transform: scale(1.5) rotate(360deg); opacity: 0; }
}
.pp-star-trail{
  position: fixed; pointer-events: none; z-index: 10000;
  font-size: 16px; color: #ffe680;
  animation: ppStarTrail 0.7s ease-out forwards;
}

/* ── Colour Houses ── */
.pp-houses-grid{
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  max-width: 600px; margin: 0 auto;
}
.pp-house{
  position: relative;
  border-radius: 18px; padding: 24px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  text-align: center;
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(0,0,0,0.12);
  transition: transform 0.2s;
}
.pp-house.red    { background: linear-gradient(135deg, #ff5454, #c8262e); --house-color: #d62828; }
.pp-house.green  { background: linear-gradient(135deg, #4cd97d, #2e8a4f); --house-color: #2e8a4f; }
.pp-house.blue   { background: linear-gradient(135deg, #4a90e2, #1e5fab); --house-color: #1e5fab; }
.pp-house.yellow { background: linear-gradient(135deg, #ffd23a, #d49b1a); --house-color: #d49b1a; color: #2a1f00; }
.pp-house-name{
  font-family: 'Bagel Fat One', 'DM Serif Display', sans-serif;
  font-size: 24px; letter-spacing: 1px; text-transform: uppercase;
}
.pp-house-pts{
  font-family: 'Bagel Fat One', 'DM Serif Display', sans-serif;
  font-size: 56px; line-height: 1;
  text-shadow: 0 3px 10px rgba(0,0,0,0.18);
}
.pp-house-add{
  background: rgba(255,255,255,0.92); color: var(--house-color);
  border: none; border-radius: 100px;
  padding: 9px 18px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s;
}
.pp-house-add:active{ transform: scale(0.92); }

/* House wobble for the milestone celebration */
@keyframes ppHouseWobble{
  0%,100% { transform: rotate(0); }
  20%     { transform: rotate(-4deg) scale(1.05); }
  40%     { transform: rotate(4deg) scale(1.05); }
  60%     { transform: rotate(-3deg) scale(1.03); }
  80%     { transform: rotate(2deg) scale(1.02); }
}
.pp-house.wobble{ animation: ppHouseWobble 0.8s ease-in-out; }

/* Number-roll animation for the slot-machine effect */
@keyframes ppNumRoll{
  0%   { transform: translateY(-12px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
.pp-num-roll{ animation: ppNumRoll 0.35s cubic-bezier(.34,1.56,.64,1); }

/* Coloured dot burst when a point is added */
@keyframes ppDotBurst{
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--bx,30px), var(--by,-30px)) scale(0); opacity: 0; }
}
.pp-burst-dot{
  position: absolute; pointer-events: none;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--burst-color, #fff);
  animation: ppDotBurst 0.7s ease-out forwards;
}

/* ── Stunt Training tabs ── */
.pp-tab-strip{
  display: flex; gap: 8px; padding: 0 16px 14px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid #f0d4e4;
  margin-bottom: 18px;
}
.pp-tab-strip::-webkit-scrollbar{ display: none; }
.pp-tab{
  background: white; border: 1.5px solid #f0d4e4; border-radius: 100px;
  padding: 8px 18px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--stone); cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.pp-tab.active{
  background: linear-gradient(135deg, #e91e8c, #c4559a);
  color: white; border-color: transparent;
  box-shadow: 0 3px 12px rgba(196,85,154,0.35);
}
.pp-tab:active{ transform: scale(0.95); }

/* ── Timer ── */
.pp-timer{
  background: linear-gradient(135deg, #faf3ff, #f0e6fa);
  border: 1.5px solid #e0d0ed; border-radius: 18px;
  padding: 18px 16px; max-width: 760px; margin: 0 auto;
  box-shadow: 0 4px 16px rgba(155, 89, 182, 0.12);
}
.pp-timer-hd{
  font-size: 9.5px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
  color: #7a4a99; text-align: center; margin-bottom: 10px;
}
.pp-timer-row{ display: flex; align-items: center; justify-content: center; gap: 14px; }
.pp-timer-digits{
  font-family: 'Bagel Fat One', 'DM Serif Display', sans-serif;
  font-size: 52px; color: #6a2a8c; line-height: 1;
}
.pp-timer-digits.zero-bounce{ animation: ppTimerBounce 0.6s ease-out 4; }
@keyframes ppTimerBounce{
  0%,100% { transform: scale(1); color: #6a2a8c; }
  50%     { transform: scale(1.25); color: #e91e8c; }
}
.pp-timer-controls{ display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
.pp-timer-btn{
  padding: 8px 18px;
  background: white; border: 1.5px solid #d0bce0; border-radius: 100px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
  color: #6a2a8c; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s;
}
.pp-timer-btn:active{ transform: scale(0.94); }
.pp-timer-btn.primary{
  background: linear-gradient(135deg, #b067dd, #6a2a8c); color: white; border: none;
  box-shadow: 0 3px 10px rgba(106, 42, 140, 0.3);
}

/* The scroll wheel (iPhone-style picker) */
.pp-wheel-wrap{
  display: flex; gap: 18px; justify-content: center; align-items: center;
  margin-bottom: 14px;
}
.pp-wheel{
  position: relative;
  height: 132px; width: 78px;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  background: white;
  border-radius: 14px;
  border: 1.5px solid #e0d0ed;
  scrollbar-width: none;
  /* Top + bottom fade so middle row reads as the "selected" item */
  mask-image: linear-gradient(180deg, transparent 0%, #000 30%, #000 70%, transparent 100%);
  -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 30%, #000 70%, transparent 100%);
}
.pp-wheel::-webkit-scrollbar{ display: none; }
.pp-wheel-spacer{ height: 44px; scroll-snap-align: none; }
.pp-wheel-item{
  height: 44px; display: flex; align-items: center; justify-content: center;
  scroll-snap-align: center;
  font-family: 'DM Sans', sans-serif; font-size: 24px; font-weight: 600;
  color: var(--ink);
}
.pp-wheel-label{
  font-family: 'DM Sans', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #7a4a99; text-align: center; margin-top: 4px;
}
.pp-wheel-colon{
  font-family: 'Bagel Fat One', sans-serif; font-size: 36px; color: #6a2a8c;
  align-self: center; padding-bottom: 18px;
}
/* PINK PANTHERS FULLOUT */
.pp-fo-grid{display:grid;grid-template-columns:96px repeat(4,minmax(0,1fr));gap:10px;align-items:stretch;}
.pp-fo-colhd{display:flex;align-items:center;justify-content:center;padding:7px 14px;background:linear-gradient(135deg,#e91e8c,#c4559a);color:white;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;box-shadow:0 4px 14px rgba(196,85,154,.35);}
.pp-fo-flyer{display:flex;align-items:center;justify-content:flex-start;font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:var(--pink);padding:0 6px;line-height:1.1;}
.pp-fo-cell{position:relative;background:white;border-radius:14px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:74px;border:1.5px solid var(--border);transition:all .2s;}
.pp-fo-cell.empty{background:transparent;border:1px dashed var(--border);opacity:.45;}
.pp-fo-cell.empty::after{content:"—";color:var(--stone);font-size:14px;}
.pp-fo-cell.set{border-color:transparent;}
.pp-fo-cell.hit{background:linear-gradient(135deg,#fff5fa,#ffeaf5);border-color:#f4c4dc;}
.pp-fo-cell.miss{background:linear-gradient(135deg,#fff4f2,#ffe7e3);border-color:#e8b8b0;}
.pp-fo-cell.absent,.pp-fo-cell.missed,.pp-fo-cell.na{background:#f4f3f1;border-color:#e0dfdc;}
.pp-fo-hit-btn{background:linear-gradient(135deg,#e91e8c,#c4559a);color:white;border:none;border-radius:100px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;-webkit-tap-highlight-color:rgba(255,255,255,.2);touch-action:manipulation;box-shadow:0 3px 10px rgba(196,85,154,.3);width:100%;max-width:120px;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform .12s;}
.pp-fo-hit-btn:active{transform:scale(.92);}
.pp-fo-miss-btn{background:white;color:#b33a2d;border:1.5px solid #d8908a;border-radius:100px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;-webkit-tap-highlight-color:rgba(179,58,45,.15);touch-action:manipulation;width:100%;max-width:120px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;}
.pp-fo-miss-btn:active{transform:scale(.92);background:#fff4f2;}
.pp-fo-clear{position:absolute;top:5px;right:5px;width:20px;height:20px;background:rgba(255,255,255,.85);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--stone);line-height:1;-webkit-tap-highlight-color:transparent;}
.pp-fo-clear:hover{color:var(--red);border-color:var(--red);}
.pp-fo-result-crown{font-size:36px;line-height:1;}
.pp-fo-result-hit-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink);margin-top:-2px;}
.pp-fo-result-miss-val{font-family:'DM Serif Display',serif;font-size:26px;font-style:italic;color:#b33a2d;line-height:1;}
.pp-fo-result-miss-tags{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:3px;}
.pp-fo-result-miss-tag{background:rgba(179,58,45,.1);color:#8a2820;font-size:8.5px;font-weight:600;padding:2px 6px;border-radius:100px;letter-spacing:.3px;}
.pp-fo-result-noperf{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:center;line-height:1.3;}
.pp-fo-result-noperf-emoji{font-size:22px;line-height:1;margin-bottom:3px;}
/* POPUP */
.pp-popup-backdrop{position:fixed;inset:0;background:rgba(20,15,25,.55);z-index:10000;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .15s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.pp-popup{background:white;border-radius:18px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .18s ease-out;}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.pp-popup-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);}
.pp-popup-title{font-family:'DM Serif Display',serif;font-size:22px;font-style:italic;color:var(--ink);line-height:1.1;}
.pp-popup-sub{font-size:11px;color:var(--stone);margin-top:3px;letter-spacing:.5px;}
.pp-popup-body{padding:8px 0;}
.pp-popup-section{padding:6px 22px;}
.pp-popup-section-hd{font-size:9.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin:10px 0 6px;}
.pp-popup-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s;border:1.5px solid transparent;}
.pp-popup-row:hover{background:#faf8fa;}
.pp-popup-row.selected{background:rgba(196,85,154,.08);border-color:rgba(196,85,154,.3);}
.pp-popup-chk{width:20px;height:20px;border:1.5px solid var(--border);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;transition:all .12s;}
.pp-popup-row.selected .pp-popup-chk{background:var(--pink);border-color:var(--pink);}
.pp-popup-row.selected .pp-popup-chk::after{content:"";width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.pp-popup-row-lbl{flex:1;font-size:13.5px;color:var(--ink);}
.pp-popup-row-val{font-family:'DM Serif Display',serif;font-size:15px;font-style:italic;color:#b33a2d;font-weight:600;}
.pp-popup-noperf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 22px 8px;}
.pp-popup-noperf-btn{background:#f4f3f1;border:1.5px solid var(--border);border-radius:12px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--ink-lt);-webkit-tap-highlight-color:rgba(196,85,154,.15);transition:all .12s;}
.pp-popup-noperf-btn:active{transform:scale(.96);background:#ebebe9;}
.pp-popup-noperf-emoji{font-size:22px;line-height:1;}
.pp-popup-foot{display:flex;gap:10px;padding:14px 22px 18px;border-top:1px solid var(--border);background:#fafafa;}
.pp-popup-btn-cancel{flex:1;padding:11px;background:white;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink-lt);cursor:pointer;}
.pp-popup-btn-save{flex:1.5;padding:11px;background:linear-gradient(135deg,#e91e8c,#c4559a);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;box-shadow:0 4px 14px rgba(196,85,154,.3);}
.pp-popup-btn-save:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}

// ── ALARM SOUND ──
function ensureAudio(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended")audioCtx.resume();
  }catch(e){}
}
// Unlock audio on first user interaction (required for iPad/desktop)
document.addEventListener("pointerdown",ensureAudio,{once:false,passive:true});

function playAlarm(){
  try{
    ensureAudio();if(!audioCtx)return;
    [0,300,600].forEach(delay=>{
      const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.frequency.value=880;osc.type="sine";
      gain.gain.setValueAtTime(0.4,audioCtx.currentTime+delay/1000);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+delay/1000+0.5);
      osc.start(audioCtx.currentTime+delay/1000);osc.stop(audioCtx.currentTime+delay/1000+0.5);
    });
  }catch(e){}
}

// ── SECTION TIMER ──
function startSectionTimer(secs,label,secId){
  stopSectionTimer();
  sectionTimerSecs=secs;sectionTimerSecId=secId;
  document.getElementById("section-timer-label").textContent=label;
  document.getElementById("section-stop-btn").style.display="inline-block";
  document.querySelectorAll(".plan-block").forEach(b=>b.classList.remove("active-timer"));
  const block=document.getElementById("sec-block-"+secId);if(block)block.classList.add("active-timer");
  // Update start buttons
  document.querySelectorAll(".section-timer-btn").forEach(b=>{b.textContent="start";b.classList.remove("running");});
  const btn=document.getElementById("sec-btn-"+secId);if(btn){btn.textContent="stop";btn.classList.add("running");}
  updateSectionDisplay();
  sectionTimerInterval=setInterval(()=>{
    sectionTimerSecs--;updateSectionDisplay();
    if(sectionTimerSecs<=0){stopSectionTimer();playAlarm();document.getElementById("section-timer-display").textContent="TIME!";document.getElementById("section-timer-display").className="timer-display done";}
  },1000);
}

function stopSectionTimer(){
  if(sectionTimerInterval){clearInterval(sectionTimerInterval);sectionTimerInterval=null;}
  document.querySelectorAll(".plan-block").forEach(b=>b.classList.remove("active-timer"));
  document.querySelectorAll(".section-timer-btn").forEach(b=>{b.textContent="start";b.classList.remove("running");});
  document.getElementById("section-stop-btn").style.display="none";
  document.getElementById("section-timer-label").textContent="";
}

function updateSectionDisplay(){
  const el=document.getElementById("section-timer-display");if(!el)return;
  el.textContent=fmtSecs(sectionTimerSecs);
  el.className="timer-display"+(sectionTimerSecs<=30?" warning":"");
}

function toggleSectionTimer(secs,label,secId){
  if(sectionTimerInterval&&sectionTimerSecId===secId){stopSectionTimer();document.getElementById("section-timer-display").textContent="--";}
  else{startSectionTimer(secs,label,secId);}
}

// ── FREE TIMER ──
function toggleFreeTimer(){
  if(freeTimerRunning){clearInterval(freeTimerInterval);freeTimerRunning=false;document.getElementById("free-timer-btn").textContent="start";document.getElementById("free-timer-btn").classList.remove("active");}
  else{
    const val=document.getElementById("free-timer-inp").value;
    freeTimerSecs=parseTimerInput(val);
    if(!freeTimerSecs)return;
    freeTimerRunning=true;
    document.getElementById("free-timer-btn").textContent="stop";
    document.getElementById("free-timer-btn").classList.add("active");
    updateFreeDisplay();
    freeTimerInterval=setInterval(()=>{
      freeTimerSecs--;updateFreeDisplay();
      if(freeTimerSecs<=0){clearInterval(freeTimerInterval);freeTimerRunning=false;playAlarm();document.getElementById("free-timer-display").textContent="TIME!";document.getElementById("free-timer-display").className="timer-display done";document.getElementById("free-timer-btn").textContent="start";document.getElementById("free-timer-btn").classList.remove("active");}
    },1000);
  }
}

function resetFreeTimer(){
  clearInterval(freeTimerInterval);freeTimerRunning=false;freeTimerSecs=0;
  document.getElementById("free-timer-btn").textContent="start";
  document.getElementById("free-timer-btn").classList.remove("active");
  document.getElementById("free-timer-display").textContent="--";
  document.getElementById("free-timer-display").className="timer-display";
}

function updateFreeDisplay(){
  const el=document.getElementById("free-timer-display");if(!el)return;
  el.textContent=fmtSecs(freeTimerSecs);
  el.className="timer-display"+(freeTimerSecs<=10?" warning":"");
}

// ── LIVE SYNC ──
let listeners={};
function startLiveSync(){
  sd("home","busy","connecting");let done=0;
  TEAMS.forEach(t=>{
    if(listeners[t.id+"_fo"])return;
    listeners[t.id+"_fo"]=foCol(t.id).orderBy("date","desc").onSnapshot(snap=>{foCache[t.id]=snap.docs.map(d=>d.data());done++;if(done>=TEAMS.length)sd("home","ok","live");renderHome();},()=>sd("home","err","offline"));
    listeners[t.id+"_cl"]=clCol(t.id).orderBy("created_at","asc").onSnapshot(snap=>{clCache[t.id]=snap.docs.map(d=>d.data());if(curTeamId===t.id&&curTeamTab==="checklist")renderChecklistView(document.getElementById("team-content"));});
    listeners[t.id+"_pl"]=plansCol(t.id).orderBy("updated_at","desc").onSnapshot(snap=>{plansCache[t.id]=snap.docs.map(d=>d.data());if(curTeamId===t.id&&curTeamTab==="plans")renderPlansView(document.getElementById("team-content"));});
  });
}

async function planSave(p){p.updated_at=new Date().toISOString();await plansCol(curTeamId).doc(p.id).set(p);}

function renderFoRight(){
  const el=document.getElementById("fo-right");if(!el)return;

    let hdGrid=`1fr `+stunts.map(()=>"36px 36px").join(" ");
    stuntHtml+=`<div style="display:grid;grid-template-columns:${hdGrid};background:var(--panel);padding:5px 10px;border-bottom:1px solid var(--border)"><span style="font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--stone)">group</span>${hdCols}</div>`;

    allAthletes.forEach(name=>{

      }).join("");
      const rowBg=allAthletes.indexOf(name)%2===0?"var(--surface)":"transparent";
      stuntHtml+=`<div style="display:grid;grid-template-columns:${hdGrid};align-items:center;padding:5px 10px;border-top:1px solid var(--border);background:${rowBg}"><span style="font-size:11px;font-weight:500">${esc(name)}'s group</span>${rowCells}</div>`;
    });

    stuntHtml+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid ${pyH?"var(--pink)":"var(--border)"};border-radius:7px;cursor:pointer;background:${pyH?"rgba(196,85,154,.08)":"transparent"};margin-top:8px" onclick="togglePyramidHit(${fi})">${pinkChk(pyH,"togglePyramidHit("+fi+")")}<span style="font-size:12px;font-weight:${pyH?"600":"400"};color:${pyH?"var(--pink)":"var(--stone)"}">pyramid hit</span></div>`;

async function updateFoField(f,v){const s=getFo();if(!s)return;s[f]=v;await foSave(s);}
async function updateFoVideo(fi,v){const s=getFo();if(!s)return;s.fullouts[fi].videoUrl=v;await foSave(s);}
async function updateDedDesc(fi,di,v){const s=getFo();if(!s)return;s.fullouts[fi].deductions[di].desc=v;await foSave(s);}
async function addFullout(){
  const s=getFo();if(!s)return;const t=getTeam(curTeamId);
  const fo={id:uid(),deductions:[],problems:[],videoUrl:"",pyramidHit:false};
  (t.stunts||[]).forEach(stunt=>{fo[stunt.id+"Hits"]=Object.fromEntries(stunt.athletes.map(n=>[n,false]));fo[stunt.id+"Absent"]=Object.fromEntries(stunt.athletes.map(n=>[n,false]));});
  s.fullouts=s.fullouts||[];s.fullouts.push(fo);
  sd("team","busy","saving");try{await foSave(s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}

async function removeFullout(fi){if(!confirm("Remove?"))return;const s=getFo();if(!s)return;s.fullouts.splice(fi,1);await foSave(s);renderFoRight();}
async function addDed(fi,label,pts){const s=getFo();if(!s)return;s.fullouts[fi].deductions=s.fullouts[fi].deductions||[];s.fullouts[fi].deductions.push({label,pts,desc:""});document.querySelectorAll(".ded-menu").forEach(m=>m.style.display="none");activeDedDD=null;sd("team","busy","saving");try{await foSave(s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}}
async function removeDed(fi,di){const s=getFo();if(!s)return;s.fullouts[fi].deductions.splice(di,1);await foSave(s);renderFoRight();}
async function addProb(fi){
  const inp=document.getElementById("prob-inp-"+fi);const txt=inp?inp.value.trim():"";if(!txt)return;
  const s=getFo();if(!s)return;
  const clItem={id:uid(),text:txt,done:false,created_at:new Date().toISOString(),source:"fullout"};
  await clCol(curTeamId).doc(clItem.id).set(clItem);
  s.fullouts[fi].problems=s.fullouts[fi].problems||[];
  s.fullouts[fi].problems.push({id:clItem.id,text:txt,done:false});
  sd("team","busy","saving");try{await foSave(s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}
}
async function removeProb(fi,pi){const s=getFo();if(!s)return;s.fullouts[fi].problems.splice(pi,1);await foSave(s);renderFoRight();}
async function toggleProb(fi,pi){
  const s=getFo();if(!s)return;s.fullouts[fi].problems[pi].done=!s.fullouts[fi].problems[pi].done;
  const cl=(clCache[curTeamId]||[]).find(i=>i.id===s.fullouts[fi].problems[pi].id);
  if(cl){cl.done=s.fullouts[fi].problems[pi].done;await clCol(curTeamId).doc(cl.id).set(cl);}
  await foSave(s);renderFoRight();
}
async function toggleStuntHit(fi,stuntId,name){
  const s=getFo();if(!s)return;const key=stuntId+"Hits";
  s.fullouts[fi][key]=s.fullouts[fi][key]||{};s.fullouts[fi][key][name]=!s.fullouts[fi][key][name];
  sd("team","busy","saving");try{await foSave(s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}
}
async function toggleStuntAbsent(fi,stuntId,name){
  const s=getFo();if(!s)return;const key=stuntId+"Absent";const hitKey=stuntId+"Hits";

function calcStartTime(plan,secIndex){
  const team=getTeam(curTeamId);const t=team.templates[plan.templateId];
  if(!t||!t.time)return null;
  const match=t.time.match(/(\d+):(\d+)\s*(am|pm)/i);if(!match)return null;
  let h=parseInt(match[1]),m=parseInt(match[2]);const ampm=match[3].toLowerCase();
  if(ampm==="pm"&&h!==12)h+=12;if(ampm==="am"&&h===12)h=0;
  let totalMins=h*60+m;
  for(let i=0;i<secIndex;i++){totalMins+=parseInt(plan.sections[i]?.duration)||0;}
  const endMins=totalMins+(parseInt(plan.sections[secIndex]?.duration)||0);
  function fmt(mins){const hh=Math.floor(mins/60)%24;const mm=mins%60;const ap=hh>=12?"pm":"am";const h12=hh%12||12;return h12+":"+(mm<10?"0":"")+mm+" "+ap;}
  return fmt(totalMins)+" — "+fmt(endMins);
}

function getCoordWeeks(){
  // T2 W5 onwards (current week is W4, so show from W5)
  const weeks=[];
  const start=new Date("2026-05-11"); // W5 start
  for(let i=0;i<8;i++){
    const d=new Date(start);d.setDate(d.getDate()+i*7);
    const dd=String(d.getDate()).padStart(2,"0");
    const mm=String(d.getMonth()+1).padStart(2,"0");
    weeks.push({key:`w${5+i}`,label:`W${5+i}`,date:`${dd}/${mm}`});
  }
  return weeks;
}

function renderCoordView(container){
  startCoordListener();
  const weeks=getCoordWeeks();
  const data=coordCache||{};

  // Calculate totals per section
  const totals={};
  COORD_SECTIONS.forEach(sec=>{totals[sec]={alissa:0,lydia:0};});
  weeks.forEach(w=>{
    // Tues = Alissa(60min) + Lydia(30min), Wed = Lydia(120min)
    ["tues","wed"].forEach(day=>{
      COORD_SECTIONS.forEach(sec=>{
        const key=`${w.key}_${day}_${sec}`;
        const cell=data[key];
        if(cell){
          if(cell.alissa_mins)totals[sec].alissa+=cell.alissa_mins;
          if(cell.lydia_mins)totals[sec].lydia+=cell.lydia_mins;
        }
      });
    });
  });

  // Total mins per section (both coaches)
  const secTotals=COORD_SECTIONS.map(sec=>({sec,mins:totals[sec].alissa+totals[sec].lydia})).filter(x=>x.mins>0);
  const grandTotal=secTotals.reduce((a,x)=>a+x.mins,0);

  let html=`<div style="flex:1;overflow-y:auto;padding:0 0 60px">`;

  // Coach selector

function drawCoordPie(){
  const canvas=document.getElementById("coord-pie");if(!canvas)return;
  const total=parseInt(canvas.dataset.total)||0;
  const valsStr=canvas.dataset.vals||"";
  if(!total||!valsStr)return;
  const entries=valsStr.split(",").map(s=>{const p=s.split("|");return{v:parseInt(p[0]),c:p[1]};});
  const ctx=canvas.getContext("2d");
  const W=220,H=220,R=95,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  let angle=-Math.PI/2;
  entries.forEach(d=>{
    const sweep=(d.v/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+sweep);
    ctx.closePath();ctx.fillStyle=d.c;ctx.fill();
    ctx.strokeStyle="white";ctx.lineWidth=2;ctx.stroke();
    angle+=sweep;
  });
}

      if (stored[key] && stored[key].date === today) ppSessionDrafts[key] = stored[key];

// Tiny beep helper — kind: "tap"|"star"|"point"|"hit"|"timer"
function ppSound(kind){
  if(ppMuted)return;
  try{
    ensureAudio(); if(!audioCtx)return;
    const now = audioCtx.currentTime;
    const make = (freq,start,dur,vol=0.18,type="sine")=>{
      const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
      osc.type=type; osc.frequency.value=freq;
      osc.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(vol,now+start);
      g.gain.exponentialRampToValueAtTime(0.001,now+start+dur);
      osc.start(now+start); osc.stop(now+start+dur);
    };
    if(kind==="tap"){ make(880,0,0.05,0.1,"sine"); }
    else if(kind==="star"){ make(880,0,0.08,0.18); make(1320,0.06,0.12,0.18); }
    else if(kind==="point"){ make(660,0,0.08,0.18); make(990,0.07,0.12,0.18); }
    else if(kind==="hit"){ [523,659,784,1047].forEach((f,i)=>make(f,i*0.05,0.18,0.16)); }
    else if(kind==="timer"){ [880,880,1175].forEach((f,i)=>make(f,i*0.13,0.2,0.22,"triangle")); }
  }catch(e){}
}

// ── PP STAR CHART ──
async function ppAddStar(athleteName, sourceEl){
  const id = ppAthleteId(athleteName);
  const cur = ppStarsCache[id] || {name:athleteName, count:0};
  const newCount = (cur.count||0) + 1;
  const updated = {name:athleteName, count:newCount, updated_at:new Date().toISOString()};
  ppStarsCache[id] = updated; // optimistic
  ppSound("star");

  // Fly-in animation: spawn a star at the button and animate it into the row
  if(sourceEl){
    const r = sourceEl.getBoundingClientRect();
    const target = sourceEl.closest(".pp-star-row");
    const tr = target ? target.getBoundingClientRect() : r;
    const star = document.createElement("div");
    star.className = "pp-flying-star";
    star.textContent = "⭐";
    star.style.left = (r.left + r.width/2 - 14) + "px";
    star.style.top = (r.top + r.height/2 - 14) + "px";
    star.style.setProperty("--end-x", (tr.left + 30 - (r.left + r.width/2)) + "px");
    star.style.setProperty("--end-y", (tr.top + tr.height/2 - (r.top + r.height/2)) + "px");
    document.body.appendChild(star);
    setTimeout(()=>star.remove(), 950);
    // Sparkle trail
    for(let i=0;i<4;i++){
      const sp = document.createElement("div");
      sp.className = "pp-star-trail";
      sp.textContent = ["✦","✧","★"][Math.floor(Math.random()*3)];
      sp.style.left = (r.left + r.width/2 + (Math.random()*40-20)) + "px";
      sp.style.top  = (r.top + r.height/2 + (Math.random()*40-20)) + "px";
      sp.style.animationDelay = (i*0.08) + "s";
      document.body.appendChild(sp);
      setTimeout(()=>sp.remove(), 800);
    }
  }

  // Glow the row if we just hit a multiple of 10
  if(newCount % 10 === 0){
    setTimeout(()=>{
      const row = document.querySelector(`[data-pp-star-row="${id}"]`);
      if(row){ row.classList.add("glow"); setTimeout(()=>row.classList.remove("glow"), 2000); }
      launchConfetti();
    }, 600);
  }

  // Re-render after the flight animation finishes so the count updates
  setTimeout(()=>{ if(curTeamTab==="pp_star_chart") renderTeamTab(); }, 600);

  try{ await ppStarsCol().doc(id).set(updated); }
  catch(e){ console.error("Failed to save star:", e); }
}

// ── PP COLOUR HOUSES ──
async function ppAddHousePoint(color, sourceEl){
  ppHousesCache[color] = (ppHousesCache[color]||0) + 1;
  ppHousesCache.updated_at = new Date().toISOString();
  ppSound("point");

  // Update the visible number with a slot-machine roll
  const numEl = document.querySelector(`[data-pp-house-num="${color}"]`);
  if(numEl){
    numEl.textContent = ppHousesCache[color];
    numEl.classList.remove("pp-num-roll"); void numEl.offsetWidth; numEl.classList.add("pp-num-roll");
  }

  // Coloured dot burst
  if(sourceEl){
    const houseColors = {red:"#ff6b6b", green:"#4cd97d", blue:"#4a90e2", yellow:"#ffd23a"};
    const r = sourceEl.getBoundingClientRect();
    for(let i=0;i<8;i++){
      const dot = document.createElement("div");
      dot.className = "pp-burst-dot";
      const angle = (i / 8) * Math.PI * 2;
      const dist = 60 + Math.random()*30;
      dot.style.left = (r.left + r.width/2 - 5) + "px";
      dot.style.top  = (r.top + r.height/2 - 5) + "px";
      dot.style.position = "fixed";
      dot.style.setProperty("--bx", (Math.cos(angle)*dist) + "px");
      dot.style.setProperty("--by", (Math.sin(angle)*dist) + "px");
      dot.style.setProperty("--burst-color", houseColors[color]);
      document.body.appendChild(dot);
      setTimeout(()=>dot.remove(), 750);
    }
  }

  // Milestone (every 50): wobble the house + confetti
  if(ppHousesCache[color] % 50 === 0){
    const houseEl = document.querySelector(`[data-pp-house="${color}"]`);
    if(houseEl){
      houseEl.classList.remove("wobble"); void houseEl.offsetWidth; houseEl.classList.add("wobble");
    }
    setTimeout(launchConfetti, 200);
  }

  try{ await ppHousesDoc().set(ppHousesCache, {merge:true}); }
  catch(e){ console.error("Failed to save house point:", e); }
}

// ── PP TIMER (iPhone-style scroll wheels) ──
let ppTimerInterval = null;
let ppTimerSecs = 0;       // remaining seconds when running
let ppTimerSetSecs = 0;    // the "set" duration from the wheels
let ppTimerRunning = false;
let ppTimerWheelMin = 5;   // initial: 5:00
let ppTimerWheelSec = 0;
function ppTimerHtml(){
  // Build minute & second wheels
  const mins = []; for(let i=0;i<=30;i++) mins.push(i);
  const secs = [0,15,30,45];
  const fmt = n => String(n).padStart(2,"0");
  const showRunning = ppTimerRunning || ppTimerSecs > 0;
  const dispM = Math.floor(ppTimerSecs/60), dispS = ppTimerSecs%60;
  return `
    ${showRunning ? `
      <div class="pp-timer-row" style="margin-bottom:6px">
        <span class="pp-timer-digits ${ppTimerSecs===0?"zero-bounce":""}" id="pp-timer-disp">${fmt(dispM)}:${fmt(dispS)}</span>
      </div>
    ` : `
      <div class="pp-wheel-wrap">
        <div>
          <div class="pp-wheel" data-pp-wheel="min">
            <div class="pp-wheel-spacer"></div>
            ${mins.map(n=>`<div class="pp-wheel-item" data-val="${n}">${n}</div>`).join("")}
            <div class="pp-wheel-spacer"></div>
          </div>
          <div class="pp-wheel-label">min</div>
        </div>
        <div class="pp-wheel-colon">:</div>
        <div>
          <div class="pp-wheel" data-pp-wheel="sec">
            <div class="pp-wheel-spacer"></div>
            ${secs.map(n=>`<div class="pp-wheel-item" data-val="${n}">${fmt(n)}</div>`).join("")}
            <div class="pp-wheel-spacer"></div>
          </div>
          <div class="pp-wheel-label">sec</div>
        </div>
      </div>
    `}
    <div class="pp-timer-controls">
      ${ppTimerRunning
        ? `<button type="button" class="pp-timer-btn primary" data-pp-home-action="timer-pause">⏸ pause</button>`
        : `<button type="button" class="pp-timer-btn primary" data-pp-home-action="timer-start">▶ start</button>`}
      <button type="button" class="pp-timer-btn" data-pp-home-action="timer-reset">reset</button>
    </div>
  `;
}
function ppTimerInitWheels(){
  const wMin = document.querySelector('[data-pp-wheel="min"]');
  const wSec = document.querySelector('[data-pp-wheel="sec"]');
  if(wMin){
    // Scroll to the saved minute
    const items = wMin.querySelectorAll(".pp-wheel-item");
    const idx = ppTimerWheelMin;
    if(items[idx]) wMin.scrollTop = idx * 44;
  }
  if(wSec){
    const items = wSec.querySelectorAll(".pp-wheel-item");
    const secIdx = [0,15,30,45].indexOf(ppTimerWheelSec);
    if(items[secIdx>=0?secIdx:0]) wSec.scrollTop = (secIdx>=0?secIdx:0) * 44;
  }
}
function ppTimerWheelChanged(wheel){
  // Snap-style read: the item closest to the center is "selected"
  const center = wheel.scrollTop + 22; // wheel height is 132, so middle row is around scrollTop + 44 + half
  // Our spacer is 44 tall; the visible-center item is at scrollTop / 44
  const idx = Math.round(wheel.scrollTop / 44);
  const items = wheel.querySelectorAll(".pp-wheel-item");
  const it = items[idx];
  if(!it) return;
  const val = parseInt(it.getAttribute("data-val"), 10);
  if(wheel.getAttribute("data-pp-wheel") === "min"){ ppTimerWheelMin = val; }
  else { ppTimerWheelSec = val; }
}
function ppTimerStart(){
  if(ppTimerRunning) return;
  // If we have a remaining time from a paused state, keep it; else read from wheels
  if(ppTimerSecs <= 0){
    ppTimerSetSecs = ppTimerWheelMin * 60 + ppTimerWheelSec;
    ppTimerSecs = ppTimerSetSecs;
    if(ppTimerSecs <= 0) return; // nothing to do
  }
  ppTimerRunning = true;
  // Re-render so the wheels swap to a digit display
  if(curTeamTab==="pp_home") renderTeamTab();
  ppTimerInterval = setInterval(()=>{
    ppTimerSecs = Math.max(0, ppTimerSecs-1);
    const disp = document.getElementById("pp-timer-disp");
    if(disp){
      const m = Math.floor(ppTimerSecs/60), s = ppTimerSecs%60;
      disp.textContent = String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    }
    if(ppTimerSecs === 0){
      ppTimerRunning = false;

function calcTrend(sessions){
  if(sessions.length<2)return null;
  const p1=sessions[0].attempts>0?sessions[0].hits/sessions[0].attempts:0;
  const p2=sessions[1].attempts>0?sessions[1].hits/sessions[1].attempts:0;
  const diff=p1-p2;
  if(diff>0.05)return{arrow:"↑ improving",cls:"trend-up"};
  if(diff<-0.05)return{arrow:"↓ dropping",cls:"trend-down"};
  return{arrow:"→ steady",cls:"trend-flat"};
}

function selectPPGroup(groupId){
  ppCurGroup=groupId;
  // Restore any in-progress draft for this group; otherwise start fresh.
  const key = ppCurStunt + "_" + groupId;

  if(draft){
    ppSessionData = {attempts: draft.attempts||0, hits: draft.hits||0, celebrated: false};
    // If the restored state is already at 100%, mark celebrated=true so we don't re-fire confetti
    // on the first re-render. ppAdjust/ppHit will re-arm it normally if they drop below 100%.
    const at100 = ppSessionData.attempts>0 && ppSessionData.hits===ppSessionData.attempts;
    ppSessionData.celebrated = at100;
  } else {
    ppSessionData = {attempts:0, hits:0, celebrated:false};
  }
  curTeamTab="pp_session";
  renderTeamTab();
}

function ppHit(){
  ensureAudio(); // unlock audio context now (we're inside a user gesture)
  ppSessionData.hits=(ppSessionData.hits||0)+1;
  ppSessionData.attempts=Math.max(ppSessionData.attempts||0,ppSessionData.hits);
  updatePPDisplay();
  // Fire celebration the moment we cross into 100% (not on every hit while staying at 100%).
  // Re-arms when ppSessionData.celebrated gets reset by ppAdjust dropping below 100%.
  const at100=ppSessionData.attempts>0&&ppSessionData.hits===ppSessionData.attempts;
  if(at100&&!ppSessionData.celebrated){
    ppSessionData.celebrated=true;
    launchConfetti();
  }
  ppSaveDraft();
}

function ppAdjust(field,delta){
  ensureAudio();
  ppSessionData[field]=Math.max(0,(ppSessionData[field]||0)+delta);
  if(ppSessionData.hits>ppSessionData.attempts)ppSessionData.hits=ppSessionData.attempts;
  // If the user adjusts and we're no longer at 100%, re-arm the celebration so it can fire again next time.
  const at100=ppSessionData.attempts>0&&ppSessionData.hits===ppSessionData.attempts;
  if(!at100)ppSessionData.celebrated=false;
  updatePPDisplay();
  ppSaveDraft();
}

function updatePPDisplay(){
  const atts=ppSessionData.attempts||0;
  const hits=ppSessionData.hits||0;
  const pct=atts>0?Math.round((hits/atts)*100):null;
  const pctColor=pct!==null?pctCol(pct):"var(--stone)";
  const rateEl=document.getElementById("pp-rate");
  const subEl=document.getElementById("pp-rate-sub");
  const attsEl=document.getElementById("pp-atts-num");
  const hitsEl=document.getElementById("pp-hits-num");
  if(rateEl)rateEl.textContent=pct!==null?pct+"%":"--";
  if(rateEl)rateEl.style.color=pctColor;
  if(subEl)subEl.textContent=hits+" hits / "+atts+" attempts";
  if(attsEl)attsEl.textContent=atts;
  if(hitsEl)hitsEl.textContent=hits;
}

function launchConfetti(){
  const colors=["#e91e8c","#9b59b6","#f1c40f","#2ecc71","#3498db","#e74c3c","#ff9800"];
  // Play a fun ascending sound (audio context unlocked via ensureAudio)
  try{
    ensureAudio();
    if(audioCtx){
      [0,100,200,300,400].forEach((delay,i)=>{
        const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
        osc.connect(gain);gain.connect(audioCtx.destination);
        osc.frequency.value=[523,659,784,1047,1319][i];osc.type="sine";
        gain.gain.setValueAtTime(0.3,audioCtx.currentTime+delay/1000);
        gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+delay/1000+0.3);
        osc.start(audioCtx.currentTime+delay/1000);osc.stop(audioCtx.currentTime+delay/1000+0.3);
      });
    }
  }catch(e){}
  for(let i=0;i<80;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?"50%":"2px"};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

async function savePPSession(){
  if(!ppSessionData.attempts){alert("Add some attempts first!");return;}
  const session={id:uid(),stuntId:ppCurStunt,groupId:ppCurGroup,date:new Date().toISOString().split("T")[0],attempts:ppSessionData.attempts,hits:ppSessionData.hits,updated_at:new Date().toISOString()};
  await ppCol().doc(session.id).set(session);
  // Clear the draft now that it's saved permanently to Firestore
  const dkey = ppCurStunt + "_" + ppCurGroup;
  delete ppSessionDrafts[dkey];
  try { localStorage.setItem("pp_session_drafts", JSON.stringify(ppSessionDrafts)); } catch(e){}
  // Note: confetti already fires from ppHit() when 100% is reached, so we don't fire it again here.
  ppSessionData={attempts:0,hits:0};
  renderTeamTab();
}

let ppStatsFilter="today"; // today | week | total | fullout

function ppFilterSessions(sessions,filter){
  if(!sessions||!sessions.length)return[];
  const today=new Date().toISOString().split("T")[0];
  if(filter==="today")return sessions.filter(s=>s.date===today);
  if(filter==="week"){
    const d=new Date();d.setDate(d.getDate()-7);
    const cutoff=d.toISOString().split("T")[0];
    return sessions.filter(s=>s.date>=cutoff);
  }
  if(filter==="fullout")return sessions.filter(s=>s.isFullout);
  return sessions; // total
}

// Determine which group(s) get the crown for a given stunt.
// Rule: highest hit %; tie-break by most attempts that hit (i.e. raw hits); if still tied, all winners get crowns.
// Groups with 0 attempts in the period are excluded from crown contention.
function ppCrownWinners(rows){
  const eligible=rows.filter(r=>r.atts>0);
  if(!eligible.length)return new Set();
  const maxPct=Math.max(...eligible.map(r=>r.pct));
  const topByPct=eligible.filter(r=>r.pct===maxPct);
  const maxHits=Math.max(...topByPct.map(r=>r.hits));
  const winners=topByPct.filter(r=>r.hits===maxHits);
  return new Set(winners.map(r=>r.groupId));
}

// ── PINK PANTHERS FULLOUT ──
// Build the unique flyer list across all stunts (preserves first-occurrence order: pp_s1's order).
function ppAllFlyers(){
  const team=getTeam("pink_panthers");
  const seen=new Set();const out=[];
  (team.ppStunts||[]).forEach(st=>(st.groups||[]).forEach(g=>{if(!seen.has(g.name)){seen.add(g.name);out.push(g.name);}}));
  return out;
}
// Is this flyer in this stunt's groups?
function ppFlyerInStunt(flyer,stunt){return(stunt.groups||[]).some(g=>g.name===flyer);}

function ppFoCellKey(flyer,stuntId){return flyer.toLowerCase()+"__"+stuntId;}

function ppFoGetCurrent(){
  // Returns the fullout currently being edited, or null if not editing one.
  if(!ppFoCurId) return null;
  return ppFoCache[ppFoCurId] || null;
}

function ppFoCellTotalDeduction(cell){
  if(!cell||cell.status!=="not_hit"||!cell.deductions)return 0;
  return cell.deductions.reduce((a,id)=>a+ppDeductValue(id),0);
}

function ppFoTotalDeduction(fo){
  if(!fo)return 0;
  let total=0;
  if(fo.cells)Object.values(fo.cells).forEach(c=>{total+=ppFoCellTotalDeduction(c);});
  if(fo.tumbling)fo.tumbling.forEach(t=>{total+=(t.value||0.25);});
  return Math.round(total*100)/100;
}

async function ppFoSetCell(flyer,stuntId,update){
  if(!ppFoCurId) return;
  const cur=ppFoCache[ppFoCurId];
  if(!cur) return;
  if(!cur.cells) cur.cells={};
  const key=ppFoCellKey(flyer,stuntId);
  if(update===null||update===undefined){delete cur.cells[key];}
  else{cur.cells[key]=update;}
  cur.updated_at=new Date().toISOString();
  ppFoCache[ppFoCurId]=cur;
  // Re-render immediately so the user sees instant feedback (don't wait for the snapshot round-trip)
  if(curTeamTab==="pp_fullout"&&!ppFoPopup)renderTeamTab();
  try{await ppFoCol().doc(ppFoCurId).set(cur);}catch(e){console.error("Failed to save fullout cell:",e);}
}

function ppFoOnHit(flyer,stuntId){
  ensureAudio();
  ppFoSetCell(flyer,stuntId,{status:"hit",updated_at:new Date().toISOString()});
  launchConfetti();
}

function ppFoOnMiss(flyer,stuntId){
  // Open the deductions popup. If the cell already has data, pre-populate with existing selections.
  const fo=ppFoGetCurrent();
  if(!fo) return;
  const existing=fo.cells&&fo.cells[ppFoCellKey(flyer,stuntId)];
  const preselected=(existing&&existing.status==="not_hit"&&existing.deductions)?existing.deductions:[];
  ppFoPopup={kind:"cell-deductions",flyer,stuntId,deductions:new Set(preselected)};
  ppFoRenderPopup();
}

function ppFoClearCell(flyer,stuntId){
  ppFoSetCell(flyer,stuntId,null);
}

function ppFoNewFullout(){
  // Each new fullout gets a unique id (timestamp-based), so multiple per day work.
  const now=new Date();
  const id="fo_"+now.getTime();
  const fresh={
    id,
    date: now.toISOString().split("T")[0],
    startedAt: now.toISOString(),
    cells: {},
    tumbling: [],
    updated_at: now.toISOString()
  };
  ppFoCache[id]=fresh;
  ppFoCurId=id; // jump straight into the new fullout's edit view
  if(curTeamTab==="pp_fullout")renderTeamTab();
  ppFoCol().doc(id).set(fresh).catch(e=>console.error("Failed to create fullout:",e));
}

async function ppFoDelete(id){
  if(!ppFoCache[id]) return;
  delete ppFoCache[id];
  if(ppFoCurId===id) ppFoCurId=null;
  if(curTeamTab==="pp_fullout") renderTeamTab();
  try{await ppFoCol().doc(id).delete();}catch(e){console.error("Failed to delete fullout:",e);}
}

async function ppFoAddTumbling(name,description){
  if(!ppFoCurId) return;
  const cur=ppFoCache[ppFoCurId];
  if(!cur) return;
  if(!cur.tumbling)cur.tumbling=[];
  cur.tumbling.push({id:uid(),name:name.trim(),description:description.trim(),value:0.25});
  cur.updated_at=new Date().toISOString();
  ppFoCache[ppFoCurId]=cur;
  if(curTeamTab==="pp_fullout"&&!ppFoPopup)renderTeamTab();
  try{await ppFoCol().doc(ppFoCurId).set(cur);}catch(e){console.error("Failed to save tumbling:",e);}
}

async function ppFoRemoveTumbling(tumblingId){
  if(!ppFoCurId) return;
  const cur=ppFoCache[ppFoCurId];
  if(!cur||!cur.tumbling)return;
  cur.tumbling=cur.tumbling.filter(t=>t.id!==tumblingId);
  cur.updated_at=new Date().toISOString();
  ppFoCache[ppFoCurId]=cur;
  if(curTeamTab==="pp_fullout"&&!ppFoPopup)renderTeamTab();
  try{await ppFoCol().doc(ppFoCurId).set(cur);}catch(e){console.error("Failed to remove tumbling:",e);}
}

// ── HISTORY GROUPING / FORMATTING HELPERS ──
// Group fullouts by ISO week (Mon-Sun), newest first.
function ppFoGroupByWeek(fullouts){
  const sorted=fullouts.slice().sort((a,b)=>(b.startedAt||(b.date+"T12:00:00Z")).localeCompare(a.startedAt||(a.date+"T12:00:00Z")));
  const groups={};
  sorted.forEach(fo=>{
    const d=new Date(fo.startedAt||(fo.date+"T12:00:00Z"));
    const monday=new Date(d);
    monday.setDate(d.getDate()-((d.getDay()+6)%7)); // shift back to Monday
    monday.setHours(0,0,0,0);
    const key=monday.toISOString().split("T")[0];
    if(!groups[key])groups[key]={monday:monday.toISOString(),fullouts:[]};
    groups[key].fullouts.push(fo);
  });
  return Object.values(groups).sort((a,b)=>b.monday.localeCompare(a.monday));
}

function ppFoWeekLabel(mondayIso){
  const today=new Date(); today.setHours(0,0,0,0);
  const monday=new Date(mondayIso);
  const diffDays=Math.floor((today-monday)/(24*60*60*1000));
  if(diffDays<7) return "This Week";
  if(diffDays<14) return "Last Week";
  return "Week of "+monday.toLocaleDateString("en-AU",{month:"short",day:"numeric"});
}

function ppFoFmtTime(fo){
  const d=new Date(fo.startedAt||(fo.date+"T12:00:00Z"));
  // E.g. "mon · 4:30pm"
  return d.toLocaleString("en-AU",{weekday:"short",hour:"numeric",minute:"2-digit",hour12:true}).toLowerCase().replace(",","·");
}
