<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>EOD Allstars</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0efed;--surface:#f7f6f4;--panel:#ebebea;--border:#d8d7d5;--stone:#8a8a88;--ink:#1a1a1a;--ink-lt:#4a4a48;--putty:#9a9a98;--red:#b33a2d;--white:#fafafa;--green:#2d7a52;--orange:#c47a1a;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--ink);}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;width:100%;flex:1;min-height:0;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}
.topbar{background:var(--ink);display:flex;align-items:center;padding:0 16px;height:56px;flex-shrink:0;gap:10px;}
.topbar-wordmark{font-family:'DM Serif Display',serif;font-style:italic;font-size:20px;color:white;}
.topbar-sub{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555;margin-left:3px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#444;}
.sync-dot.ok{background:#4a9d6f;}
.sync-dot.err{background:#b33a2d;}
.sync-dot.busy{background:#c4a44a;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.backbar{background:var(--ink);display:flex;align-items:center;padding:0 16px;height:44px;flex-shrink:0;gap:10px;}
.back-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:#666;padding:0;}
.back-btn:hover{color:#bbb;}
.backbar-title{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:#ccc;}
.backbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.home-body{flex:1;overflow-y:auto;padding:24px;}
.section-hd{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--stone);margin-bottom:14px;}
.teams-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.team-tile{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;transition:all .15s;min-height:105px;text-align:center;}
.team-tile:hover{border-color:#c8c7c5;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.07);}
.team-tile.all{background:var(--ink);border-color:var(--ink);}
.team-abbr{font-size:26px;font-weight:700;line-height:1;}
.team-tile.all .team-abbr{color:white;}
.team-name{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--stone);line-height:1.3;}
.team-tile.all .team-name{color:#555;}
.team-stat{font-size:9px;color:var(--putty);}
.team-tile.all .team-stat{color:#444;}
.team-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.team-nav{width:170px;flex-shrink:0;background:var(--ink);padding:12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
.tnav-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#555;text-align:left;padding:8px 10px;border-radius:6px;}
.tnav-btn:hover,.tnav-btn.active{color:#ddd;background:rgba(255,255,255,.07);}
.team-content{flex:1;overflow-y:auto;background:var(--bg);padding:20px 22px 60px;}
.fo-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.fo-left{width:180px;flex-shrink:0;background:var(--ink);padding:12px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;}
.fo-right{flex:1;background:var(--bg);overflow-y:auto;padding:18px 20px 60px;}
.fo-session-row{background:rgba(255,255,255,.05);border:1px solid #2a2a2a;border-radius:8px;padding:9px 11px;cursor:pointer;margin-bottom:6px;}
.fo-session-row.active,.fo-session-row:hover{background:rgba(255,255,255,.1);border-color:#444;}
.fo-sdate{font-family:'DM Serif Display',serif;font-size:14px;font-style:italic;color:#ccc;}
.fo-scount{font-size:10px;color:#555;margin-top:2px;}
.add-fo-btn{width:100%;padding:8px;background:rgba(255,255,255,.07);border:1px solid #333;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:#bbb;cursor:pointer;}
.fo-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:13px;}
.fo-card-hd{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--panel);border-bottom:1px solid var(--border);}
.fo-card-title{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;}
.fo-card-body{padding:13px;display:flex;flex-direction:column;gap:11px;}
.fo-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:5px;}
.fo-inp{width:100%;padding:7px 9px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.fo-ta{width:100%;padding:7px 9px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
.ded-row{display:flex;flex-direction:column;gap:4px;padding:7px 9px;border-bottom:1px solid var(--border);}
.ded-top{display:flex;align-items:center;gap:6px;}
.ded-tag{flex:0 0 auto;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:3px 7px;font-size:10px;font-weight:600;color:var(--ink-lt);}
.ded-pts{font-size:11px;font-weight:700;color:var(--red);}
.ded-rm{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 5px;margin-left:auto;}
.ded-desc{width:100%;padding:5px 7px;background:var(--panel);border:1px solid var(--border);border-radius:4px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink);outline:none;}
.ded-total{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--panel);border-top:1px solid var(--border);}
.add-ded-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--stone);cursor:pointer;}
.ded-menu{position:absolute;top:100%;left:0;z-index:200;background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:220px;overflow:hidden;margin-top:4px;}
.ded-mhd{padding:5px 11px;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);background:var(--panel);border-bottom:1px solid var(--border);}
.ded-mopt{padding:8px 11px;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}
.ded-mopt:last-child{border-bottom:none;}
.ded-mopt:hover{background:var(--panel);}
.opt-pts{font-size:11px;font-weight:700;color:var(--red);}
.prob-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);}
.prob-item:last-child{border-bottom:none;}
.prob-item.done .prob-txt{text-decoration:line-through;color:var(--stone);}
.prob-chk{width:17px;height:17px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.prob-chk.done{background:var(--green);border-color:var(--green);}
.prob-txt{flex:1;font-size:12px;}
.prob-rm{background:none;border:none;cursor:pointer;color:var(--stone);font-size:10px;padding:2px 4px;margin-left:auto;}
.cl-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;}
.cl-item.done{opacity:.55;}
.chk{width:19px;height:19px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.chk.ticked{background:var(--green);border-color:var(--green);}
.chk.ticked::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.cl-txt{flex:1;font-size:12px;line-height:1.4;}
.cl-item.done .cl-txt{text-decoration:line-through;color:var(--stone);}
.cl-rm{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 5px;}
.add-row{display:flex;gap:8px;margin-bottom:13px;}
.add-inp{flex:1;padding:8px 9px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.add-btn{padding:8px 13px;background:var(--ink);color:white;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.pct-bar-wrap{background:var(--border);border-radius:100px;height:5px;overflow:hidden;flex:1;}
.pct-bar{height:100%;border-radius:100px;}
.no-data{font-size:12px;color:var(--stone);font-style:italic;padding:8px 0;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:4px 7px;}
.del-btn:hover{color:var(--red);}
.a-title{font-family:'DM Serif Display',serif;font-size:19px;font-style:italic;margin-bottom:3px;}
.a-sub{font-size:11px;color:var(--stone);margin-bottom:13px;}
@media(max-width:680px){
  .teams-grid{grid-template-columns:repeat(2,1fr);}
  .team-wrap{flex-direction:column;}
  .team-nav{width:100%;flex-direction:row;flex-wrap:wrap;height:auto;padding:8px;}
  .fo-wrap{flex-direction:column;}
  .fo-left{width:100%;max-height:30vh;}
}
</style>
</head>
<body>
<div id="app">

<div id="home" class="screen active">
  <div class="topbar">
    <div style="display:flex;flex-direction:column">
      <span class="topbar-wordmark">EOD Allstars</span>
      <span class="topbar-sub">fullout tracker</span>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <div class="sync-dot busy" id="home-sync-dot"></div>
      <span style="font-size:9px;color:#555" id="home-sync-lbl">connecting</span>
    </div>
  </div>
  <div class="home-body">
    <div class="section-hd">select your team</div>
    <div class="teams-grid" id="teams-grid"></div>
  </div>
</div>

<div id="all-analytics" class="screen">
  <div class="backbar">
    <button class="back-btn" onclick="goHome()">&#8592; back</button>
    <span class="backbar-title">all teams analytics</span>
  </div>
  <div style="flex:1;overflow-y:auto;padding:20px 22px 60px" id="all-content"></div>
</div>

<div id="team-screen" class="screen">
  <div class="backbar">
    <button class="back-btn" onclick="goHome()">&#8592; back</button>
    <span class="backbar-title" id="ts-title"></span>
    <div class="backbar-right">
      <div class="sync-dot" id="team-sync-dot"></div>
      <span style="font-size:10px;color:#555" id="team-sync-lbl"></span>
    </div>
  </div>
  <div class="team-wrap">
    <div class="team-nav">
      <button class="tnav-btn active" onclick="teamTab('fullouts',this)">fullouts</button>
      <button class="tnav-btn" onclick="teamTab('analytics',this)">analytics</button>
      <button class="tnav-btn" onclick="teamTab('checklist',this)">checklist</button>
    </div>
    <div class="team-content" id="team-content"></div>
  </div>
</div>

</div>
<script>
firebase.initializeApp({apiKey:"AIzaSyA-gEiXgNxeJM369CuCzCCvHsY0V4Ge0Ps",authDomain:"eod-allstars.firebaseapp.com",projectId:"eod-allstars",storageBucket:"eod-allstars.firebasestorage.app",messagingSenderId:"951318632359",appId:"1:951318632359:web:d9cb67ded57f9b26148882"});
const db=firebase.firestore();

const TEAMS=[
  {id:"tiny-diamonds",name:"Tiny Diamonds",abbr:"TD",color:"#c0395a",athletes:["Lily","Sophie","Grace","Emma","Zoe","Chloe","Mia"]},
  {id:"lil-leopards",name:"Lil Leopards",abbr:"LL",color:"#b8860b",athletes:["Ava","Isla","Ruby","Harper","Aria","Nova","Luna"]},
  {id:"cheetahs",name:"Cheetahs",abbr:"CH",color:"#c47a1a",athletes:["Stella","Violet","Aurora","Willow","Hazel","Ivy","Jade"]},
  {id:"ibk",name:"IBK",abbr:"IBK",color:"#2d6a8f",athletes:["Maya","Layla","Zara","Nora","Ellie","Cora","Piper"]},
  {id:"lady-lynx",name:"Lady Lynx",abbr:"LLX",color:"#6a4c93",athletes:["Paisley","Scarlett","Penelope","Naomi","Aubrey","Sienna","Freya"]},
  {id:"savage-katz",name:"Savage Katz",abbr:"SK",color:"#b33a2d",athletes:["Mackenzie","Brooklyn","Kylie","Tatum","Reagan","Hadley","Blake"]},
  {id:"claw-katz",name:"Claw Katz",abbr:"CK",color:"#2d7a52",athletes:["Addison","Peyton","Jordan","Quinn","Riley","Morgan","Cameron"]},
  {id:"diamonds",name:"Diamonds",abbr:"DIA",color:"#1a1a1a",athletes:["Alexis","Kayla","Brianna","Jessica","Ashley","Brittany","Megan"]},
  {id:"pink-panthers",name:"Pink Panthers",abbr:"PP",color:"#9b2d6f",athletes:["Savannah","Madison","Lexi","Hailey","Kaitlyn","Taylor","Olivia"]}
];

const DED_TYPES=[
  {cat:"ROUTINE INFRACTIONS",items:[{label:"Athlete Fall",pts:0.25},{label:"Building Bobble",pts:0.40},{label:"Building Fall",pts:0.75},{label:"Major Building Fall",pts:1.25}]},
  {cat:"RULE VIOLATIONS",items:[{label:"Building safety violation",pts:1.0}]}
];

let foCache={},clCache={};
let curTeam=null,curTab="fullouts",curFoId=null,activeDedDD=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtS(s){if(!s)return"--";return new Date(s+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function sd(ctx,state,lbl){const d=document.getElementById(ctx+"-sync-dot"),l=document.getElementById(ctx+"-sync-lbl");if(d)d.className="sync-dot "+(state==="ok"?"ok":state==="err"?"err":state==="busy"?"busy":"");if(l)l.textContent=lbl||"";}
function getTeam(id){return TEAMS.find(t=>t.id===id);}
function getSessions(tid){return foCache[tid]||[];}
function getCL(tid){return clCache[tid]||[];}
function getFo(tid,id){return getSessions(tid).find(s=>s.id===id);}
function pctCol(p){return p>=90?"#2d7a52":p>=75?"#c47a1a":"#b33a2d";}

document.addEventListener("click",e=>{if(activeDedDD&&!activeDedDD.contains(e.target)){activeDedDD.querySelector(".ded-menu").style.display="none";activeDedDD=null;}});

function startLiveSync(){
  sd("home","busy","connecting");
  let n=0;
  TEAMS.forEach(team=>{
    db.collection("teams").doc(team.id).collection("fulloutSessions").orderBy("date","desc").onSnapshot(snap=>{
      foCache[team.id]=snap.docs.map(d=>d.data());n++;
      if(n>=TEAMS.length)sd("home","ok","live");
      renderGrid();
      if(curTeam===team.id){if(curTab==="fullouts")renderFoList();if(curTab==="analytics"){const c=document.getElementById("team-content");if(c)renderAnalytics(c);}}
    },()=>sd("home","err","offline"));
    db.collection("teams").doc(team.id).collection("checklist").orderBy("created_at","asc").onSnapshot(snap=>{
      clCache[team.id]=snap.docs.map(d=>d.data());
      if(curTeam===team.id&&curTab==="checklist")renderCLList();
    });
  });
}

async function foSave(tid,s){s.updated_at=new Date().toISOString();await db.collection("teams").doc(tid).collection("fulloutSessions").doc(s.id).set(s);}
async function foDel(tid,id){await db.collection("teams").doc(tid).collection("fulloutSessions").doc(id).delete();}
async function clSave(tid,item){await db.collection("teams").doc(tid).collection("checklist").doc(item.id).set(item);}
async function clDel(tid,id){await db.collection("teams").doc(tid).collection("checklist").doc(id).delete();}

function goHome(){showScreen("home");}

function renderGrid(){
  document.getElementById("teams-grid").innerHTML=TEAMS.map(t=>{
    const ss=getSessions(t.id),fo=ss.reduce((s,x)=>s+(x.fullouts?x.fullouts.length:0),0);
    return`<div class="team-tile" onclick="openTeam('${t.id}')" style="border-top:3px solid ${t.color}"><div class="team-abbr" style="color:${t.color}">${t.abbr}</div><div class="team-name">${t.name}</div><div class="team-stat">${ss.length} sessions · ${fo} fullouts</div></div>`;
  }).join("")+`<div class="team-tile all" onclick="openAll()"><div class="team-abbr">&#9733;</div><div class="team-name">All Teams Analytics</div><div class="team-stat">compare all teams</div></div>`;
}

function openTeam(tid){curTeam=tid;curFoId=null;document.getElementById("ts-title").textContent=getTeam(tid).name;teamTab("fullouts",null);showScreen("team-screen");}

function teamTab(tab,btn){
  curTab=tab;
  document.querySelectorAll(".tnav-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  else document.querySelectorAll(".tnav-btn").forEach(b=>{if(b.textContent.trim().toLowerCase()===tab)b.classList.add("active");});
  const c=document.getElementById("team-content");
  if(tab==="fullouts")renderFoContent(c);
  else if(tab==="analytics")renderAnalytics(c);
  else renderChecklistContent(c);
}

function renderFoContent(c){
  c.innerHTML=`<div class="fo-wrap"><div class="fo-left"><button class="add-fo-btn" onclick="addFoSession()">+ new session</button><div id="fo-session-list"></div></div><div class="fo-right" id="fo-right"><div class="no-data" style="padding:40px 0;text-align:center">Select or create a session.</div></div></div>`;
  renderFoList();if(curFoId)renderFoRight();
}

function renderFoList(){
  const el=document.getElementById("fo-session-list");if(!el)return;
  const ss=getSessions(curTeam);
  if(!ss.length){el.innerHTML='<div style="font-size:11px;color:#444;font-style:italic;padding:8px 0">No sessions yet.</div>';return;}
  el.innerHTML=ss.map(s=>`<div class="fo-session-row${s.id===curFoId?" active":""}" onclick="openFoSession('${s.id}')"><div class="fo-sdate">${s.date?fmtS(s.date):"no date"}</div><div class="fo-scount">${s.fullouts?s.fullouts.length:0} fullout${s.fullouts&&s.fullouts.length!==1?"s":""}</div></div>`).join("");
}

async function addFoSession(){
  const s={id:uid(),date:new Date().toISOString().split("T")[0],issues:"",fullouts:[]};
  sd("team","busy","saving");try{await foSave(curTeam,s);sd("team","ok","saved");openFoSession(s.id);}catch{sd("team","err","failed");}
}

function openFoSession(id){curFoId=id;renderFoList();renderFoRight();}

function renderFoRight(){
  const el=document.getElementById("fo-right");if(!el)return;
  const session=getFo(curTeam,curFoId);
  if(!session){el.innerHTML='<div class="no-data" style="padding:40px 0;text-align:center">Select or create a session.</div>';return;}
  const team=getTeam(curTeam);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h2 style="font-family:'DM Serif Display',serif;font-size:21px;font-style:italic">fullout session</h2><button class="del-btn" onclick="delFoSession()">delete</button></div>`;
  h+=`<div class="fo-card"><div class="fo-card-hd"><span class="fo-card-title">session details</span></div><div class="fo-card-body"><div><div class="fo-lbl">date</div><input type="date" class="fo-inp" value="${esc(session.date||"")}" oninput="updateFoField('date',this.value)"/></div><div><div class="fo-lbl">general notes</div><textarea class="fo-ta" rows="2" placeholder="overall notes..." oninput="updateFoField('issues',this.value)">${esc(session.issues||"")}</textarea></div></div></div>`;
  (session.fullouts||[]).forEach((fo,fi)=>{
    const foDed=(fo.deductions||[]).reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0);
    const s1h=fo.stunt1Hits||{},s2h=fo.stunt2Hits||{},pyH=!!(fo.pyramidHit);
    h+=`<div class="fo-card"><div class="fo-card-hd"><span class="fo-card-title">fullout ${String(fi+1).padStart(2,"0")}</span><button class="del-btn" onclick="removeFullout(${fi})">remove</button></div><div class="fo-card-body">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
    <div><div class="fo-lbl">deductions</div>
    ${fo.deductions&&fo.deductions.length?`<div style="border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:7px">${fo.deductions.map((d,di)=>`<div class="ded-row"><div class="ded-top"><div class="ded-tag">${esc(d.label)}</div><span class="ded-pts">-${parseFloat(d.pts||d.points).toFixed(2)}</span><button class="ded-rm" onclick="removeDed(${fi},${di})">x</button></div><input class="ded-desc" placeholder="e.g. Sarah - half up fell" value="${esc(d.desc||"")}" oninput="updateDedDesc(${fi},${di},this.value)"/></div>`).join("")}<div class="ded-total"><span style="font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">total</span><span style="font-size:14px;font-weight:700;color:var(--red)">-${foDed.toFixed(2)}</span></div></div>`:""}
    <div style="position:relative" id="ddw-${fi}"><button class="add-ded-btn" onclick="toggleDD(${fi})">+ add deduction</button><div class="ded-menu" id="dm-${fi}" style="display:none">${DED_TYPES.map(cat=>`<div class="ded-mhd">${cat.cat}</div>${cat.items.map(item=>`<div class="ded-mopt" onclick="addDed(${fi},'${esc(item.label)}',${item.pts})"><span>${esc(item.label)}</span><span class="opt-pts">-${item.pts.toFixed(2)}</span></div>`).join("")}`).join("")}</div></div>
    </div>
    <div><div class="fo-lbl">stunt group hits</div>
    <div style="border:1px solid var(--border);border-radius:7px;overflow:hidden">
    <div style="display:grid;grid-template-columns:1fr 42px 42px;background:var(--panel);padding:5px 9px;border-bottom:1px solid var(--border)"><span style="font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--stone)">group</span><span style="font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--stone);text-align:center">st1</span><span style="font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--stone);text-align:center">st2</span></div>
    ${(team.athletes||[]).map(name=>{const o1=!!(s1h[name]),o2=!!(s2h[name]);return`<div style="display:grid;grid-template-columns:1fr 42px 42px;align-items:center;padding:5px 9px;border-top:1px solid var(--border)"><span style="font-size:11px;font-weight:500">${esc(name)}'s group</span><div style="display:flex;justify-content:center;cursor:pointer" onclick="toggleHit(${fi},'stunt1Hits','${name}')"><div style="width:19px;height:19px;border:1.5px solid ${o1?"#4a9d6f":"var(--border)"};border-radius:3px;display:flex;align-items:center;justify-content:center;background:${o1?"#4a9d6f":"transparent"}"><span style="color:white;font-size:10px;font-weight:700">${o1?"v":""}</span></div></div><div style="display:flex;justify-content:center;cursor:pointer" onclick="toggleHit(${fi},'stunt2Hits','${name}')"><div style="width:19px;height:19px;border:1.5px solid ${o2?"#4a9d6f":"var(--border)"};border-radius:3px;display:flex;align-items:center;justify-content:center;background:${o2?"#4a9d6f":"transparent"}"><span style="color:white;font-size:10px;font-weight:700">${o2?"v":""}</span></div></div></div>`;}).join("")}
    </div>
    <div style="display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid ${pyH?"#4a9d6f":"var(--border)"};border-radius:6px;cursor:pointer;background:${pyH?"#f0faf5":"transparent"};margin-top:7px" onclick="togglePy(${fi})"><div style="width:19px;height:19px;border:1.5px solid ${pyH?"#4a9d6f":"var(--border)"};border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${pyH?"#4a9d6f":"transparent"}"><span style="color:white;font-size:10px;font-weight:700">${pyH?"v":""}</span></div><span style="font-size:12px;font-weight:${pyH?"600":"400"};color:${pyH?"#2d7a52":"var(--stone)"}">pyramid hit</span></div>
    </div></div>
    <div><div class="fo-lbl">problems / things to fix</div>
    <div style="border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:7px">${fo.problems&&fo.problems.length?fo.problems.map((p,pi)=>`<div class="prob-item${p.done?" done":""}"><div class="prob-chk${p.done?" done":""}" onclick="toggleProb(${fi},${pi})"></div><span class="prob-txt">${esc(p.text)}</span><button class="prob-rm" onclick="removeProb(${fi},${pi})">x</button></div>`).join(""):'<div style="padding:9px 11px;font-size:11px;color:var(--stone);font-style:italic">No problems added yet.</div>'}</div>
    <div style="display:flex;gap:7px"><input id="pi-${fi}" placeholder="Add a problem..." style="flex:1;padding:7px 9px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink);outline:none" onkeydown="if(event.key==='Enter')addProb(${fi})"/><button class="add-btn" style="padding:7px 11px" onclick="addProb(${fi})">+ add</button></div>
    </div>
    <div><div class="fo-lbl">video link</div>${fo.videoUrl?`<div style="display:flex;align-items:center;gap:7px"><input class="fo-inp" value="${esc(fo.videoUrl)}" oninput="updateFoVideo(${fi},this.value)"/><a href="${esc(fo.videoUrl)}" target="_blank" style="font-size:12px;color:#4a9d6f">open</a></div>`:`<input class="fo-inp" value="" oninput="updateFoVideo(${fi},this.value)" placeholder="Paste YouTube, Drive or iCloud link..."/>`}</div>
    </div></div>`;
  });
  h+=`<button style="width:100%;padding:9px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer" onclick="addFullout()">+ add fullout</button>`;
  el.innerHTML=h;
}

function toggleDD(fi){const m=document.getElementById("dm-"+fi),w=document.getElementById("ddw-"+fi);if(!m)return;const open=m.style.display!=="none";document.querySelectorAll(".ded-menu").forEach(x=>x.style.display="none");activeDedDD=null;if(!open){m.style.display="block";activeDedDD=w;}}
async function updateFoField(f,v){const s=getFo(curTeam,curFoId);if(!s)return;s[f]=v;await foSave(curTeam,s);}
async function updateFoVideo(fi,v){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi].videoUrl=v;await foSave(curTeam,s);}
async function updateDedDesc(fi,di,v){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi].deductions[di].desc=v;await foSave(curTeam,s);}
async function addFullout(){
  const s=getFo(curTeam,curFoId);if(!s)return;const t=getTeam(curTeam);s.fullouts=s.fullouts||[];
  s.fullouts.push({id:uid(),deductions:[],problems:[],videoUrl:"",stunt1Hits:Object.fromEntries(t.athletes.map(n=>[n,false])),stunt2Hits:Object.fromEntries(t.athletes.map(n=>[n,false])),pyramidHit:false});
  sd("team","busy","saving");try{await foSave(curTeam,s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}
}
async function removeFullout(fi){if(!confirm("Remove?"))return;const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts.splice(fi,1);await foSave(curTeam,s);renderFoRight();}
async function addDed(fi,label,pts){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi].deductions=s.fullouts[fi].deductions||[];s.fullouts[fi].deductions.push({label,pts,desc:""});document.querySelectorAll(".ded-menu").forEach(m=>m.style.display="none");activeDedDD=null;sd("team","busy","saving");try{await foSave(curTeam,s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}}
async function removeDed(fi,di){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi].deductions.splice(di,1);await foSave(curTeam,s);renderFoRight();}
async function addProb(fi){const inp=document.getElementById("pi-"+fi);const txt=inp?inp.value.trim():"";if(!txt)return;const s=getFo(curTeam,curFoId);if(!s)return;const item={id:uid(),text:txt,done:false,created_at:new Date().toISOString(),source:"fullout"};await clSave(curTeam,item);s.fullouts[fi].problems=s.fullouts[fi].problems||[];s.fullouts[fi].problems.push({id:item.id,text:txt,done:false});sd("team","busy","saving");try{await foSave(curTeam,s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}}
async function removeProb(fi,pi){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi].problems.splice(pi,1);await foSave(curTeam,s);renderFoRight();}
async function toggleProb(fi,pi){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi].problems[pi].done=!s.fullouts[fi].problems[pi].done;const cl=getCL(curTeam).find(i=>i.id===s.fullouts[fi].problems[pi].id);if(cl){cl.done=s.fullouts[fi].problems[pi].done;await clSave(curTeam,cl);}sd("team","busy","saving");try{await foSave(curTeam,s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}}
async function toggleHit(fi,field,name){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi][field]=s.fullouts[fi][field]||{};s.fullouts[fi][field][name]=!s.fullouts[fi][field][name];sd("team","busy","saving");try{await foSave(curTeam,s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}}
async function togglePy(fi){const s=getFo(curTeam,curFoId);if(!s)return;s.fullouts[fi].pyramidHit=!s.fullouts[fi].pyramidHit;sd("team","busy","saving");try{await foSave(curTeam,s);sd("team","ok","saved");renderFoRight();}catch{sd("team","err","failed");}}
async function delFoSession(){if(!confirm("Delete?"))return;await foDel(curTeam,curFoId);curFoId=null;renderFoList();document.getElementById("fo-right").innerHTML='<div class="no-data" style="padding:40px 0;text-align:center">Session deleted.</div>';}

function renderAnalytics(c){
  if(!c)c=document.getElementById("team-content");
  const team=getTeam(curTeam);
  const sessions=getSessions(curTeam).filter(s=>s.date).sort((a,b)=>a.date.localeCompare(b.date));
  let totalFo=0;sessions.forEach(s=>{if(s.fullouts)totalFo+=s.fullouts.length;});
  let h=`<div><div class="a-title">${team.name}</div><div class="a-sub">${sessions.length} session${sessions.length!==1?"s":""} · ${totalFo} fullout${totalFo!==1?"s":""} tracked</div>`;
  if(totalFo>0){
    h+=`<div class="a-title" style="margin-top:14px">stunt group hit rates</div><div class="a-sub">across all fullouts</div>`;
    h+=`<table style="width:100%;border:1px solid var(--border);border-radius:10px;border-collapse:collapse;overflow:hidden;margin-bottom:16px"><thead><tr style="background:var(--ink)"><th style="padding:6px 10px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:white;text-align:left">group</th><th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white;background:#2a2a2a">1st stunt</th><th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white;background:#1a1a1a">2nd stunt</th><th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white;background:#111">combined</th></tr></thead><tbody>`;
    team.athletes.forEach((name,i)=>{
      let s1h=0,s2h=0;sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{if(fo.stunt1Hits&&fo.stunt1Hits[name])s1h++;if(fo.stunt2Hits&&fo.stunt2Hits[name])s2h++;});});
      const p1=Math.round((s1h/totalFo)*100),p2=Math.round((s2h/totalFo)*100),pC=Math.round(((s1h+s2h)/(totalFo*2))*100);
      function bc(h,t,p){return`<td style="padding:6px 8px;text-align:center;font-size:11px">${h}/${t}</td><td style="padding:6px 8px;min-width:65px"><div style="display:flex;align-items:center;gap:4px"><div class="pct-bar-wrap"><div class="pct-bar" style="width:${p}%;background:${pctCol(p)}"></div></div><span style="font-size:10px;font-weight:700;color:${pctCol(p)}">${p}%</span></div></td>`;}
      h+=`<tr style="border-top:1px solid var(--border);background:${i%2===0?"var(--surface)":"transparent"}"><td style="padding:6px 10px;font-size:11px;font-weight:500">${esc(name)}'s group</td>${bc(s1h,totalFo,p1)}${bc(s2h,totalFo,p2)}${bc(s1h+s2h,totalFo*2,pC)}</tr>`;
    });
    h+=`</tbody></table>`;
    let pyH=0,pyT=0;sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{pyT++;if(fo.pyramidHit)pyH++;});});
    if(pyT>0){const pyP=Math.round((pyH/pyT)*100);h+=`<div class="a-title">pyramid hit rate</div><div class="a-sub">across all fullouts</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:14px;margin-bottom:16px"><div class="pct-bar-wrap" style="flex:1;height:8px"><div class="pct-bar" style="width:${pyP}%;background:${pctCol(pyP)}"></div></div><span style="font-size:20px;font-weight:700;color:${pctCol(pyP)}">${pyP}%</span><span style="font-size:12px;color:var(--stone)">${pyH}/${pyT}</span></div>`;}
  }
  h+=`<div class="a-title">deductions over time</div><div class="a-sub">per session, broken down by fullout</div>`;
  if(sessions.length){
    h+=sessions.map(s=>{
      const tot=(s.fullouts||[]).reduce((sum,fo)=>sum+((fo.deductions||[]).reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0)),0);
      return`<div style="border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:11px"><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 13px;background:var(--panel);border-bottom:1px solid var(--border)"><span style="font-family:'DM Serif Display',serif;font-size:14px;font-style:italic">${fmtS(s.date)}</span><span style="font-size:12px;font-weight:700;color:${tot>0?"var(--red)":"#4a9d6f"}">${tot>0?"-"+tot.toFixed(2):"clean"}</span></div>${(s.fullouts||[]).map((fo,fi)=>{const foDed=(fo.deductions||[]).reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0);return`<div style="padding:5px 13px;background:var(--ink);color:var(--surface);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #333">fullout ${String(fi+1).padStart(2,"0")} — ${foDed>0?"-"+foDed.toFixed(2):"no deductions"}</div>${(fo.deductions||[]).length?(fo.deductions||[]).map(d=>`<div style="padding:6px 13px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-lt)"><span style="color:var(--red);font-weight:600">-${parseFloat(d.pts||d.points).toFixed(2)}</span> ${esc(d.label)}${d.desc?` <span style="color:var(--stone)">&#8212; ${esc(d.desc)}</span>`:""}</div>`).join(""):'<div style="padding:6px 13px;font-size:11px;color:var(--stone)">No deductions</div>'}`}).join("")}</div>`;
    }).join("");
    const avg=sessions.reduce((sum,s)=>sum+(s.fullouts||[]).reduce((a,fo)=>a+(fo.deductions||[]).reduce((x,d)=>x+(parseFloat(d.pts||d.points)||0),0),0),0)/sessions.length;
    h+=`<div style="background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:8px 12px;display:flex;justify-content:space-between;margin-bottom:16px"><span style="font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">avg per session</span><span style="font-size:13px;font-weight:700;color:var(--red)">-${avg.toFixed(2)}</span></div>`;
  } else h+='<div class="no-data">No sessions yet.</div>';
  h+=`</div>`;c.innerHTML=h;
}

function renderChecklistContent(c){
  if(!c)c=document.getElementById("team-content");
  c.innerHTML=`<div><div style="font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--stone);margin-bottom:13px">problems / things to fix</div><div class="add-row"><input class="add-inp" id="cl-inp" placeholder="Add a problem or thing to fix..." onkeydown="if(event.key==='Enter')addCLItem()"/><button class="add-btn" onclick="addCLItem()">+ add</button></div><div id="cl-list"></div></div>`;
  renderCLList();
}

function renderCLList(){
  const el=document.getElementById("cl-list");if(!el)return;
  const items=getCL(curTeam);
  if(!items.length){el.innerHTML='<div class="no-data">No items yet. Problems added in fullouts appear here automatically.</div>';return;}
  el.innerHTML=items.map(item=>`<div class="cl-item${item.done?" done":""}"><div class="chk${item.done?" ticked":""}" onclick="toggleCL('${item.id}')"></div><span class="cl-txt">${esc(item.text)}</span><button class="cl-rm" onclick="removeCL('${item.id}')">x</button></div>`).join("");
}
async function addCLItem(){const inp=document.getElementById("cl-inp");const txt=inp.value.trim();if(!txt)return;inp.value="";await clSave(curTeam,{id:uid(),text:txt,done:false,created_at:new Date().toISOString()});}
async function toggleCL(id){const i=getCL(curTeam).find(x=>x.id===id);if(!i)return;i.done=!i.done;await clSave(curTeam,i);}
async function removeCL(id){if(!confirm("Remove?"))return;await clDel(curTeam,id);}

function openAll(){showScreen("all-analytics");renderAll();}
function renderAll(){
  const el=document.getElementById("all-content");
  let h=`<div style="font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;margin-bottom:3px">all teams</div><div style="font-size:11px;color:var(--stone);margin-bottom:18px">comparison across ${TEAMS.length} teams</div>`;
  h+=`<div style="font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:10px">overview</div>`;
  h+=`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px"><div style="display:grid;grid-template-columns:140px 70px 70px 1fr 80px;background:var(--panel);padding:7px 12px;border-bottom:1px solid var(--border)"><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">team</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:center">sessions</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:center">fullouts</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">avg deductions</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:right">pyramid %</span></div>${TEAMS.map((team,i)=>{
    const ss=getSessions(team.id).filter(s=>s.date);
    const fo=ss.reduce((sum,s)=>sum+(s.fullouts?s.fullouts.length:0),0);
    const ded=ss.reduce((sum,s)=>sum+(s.fullouts||[]).reduce((a,fo)=>a+(fo.deductions||[]).reduce((x,d)=>x+(parseFloat(d.pts||d.points)||0),0),0),0);
    const avg=ss.length>0?ded/ss.length:0;
    let pyH=0,pyT=0;ss.forEach(s=>{(s.fullouts||[]).forEach(fo=>{pyT++;if(fo.pyramidHit)pyH++;});});
    const pyP=pyT>0?Math.round((pyH/pyT)*100):null;
    const bg=i%2===0?"var(--surface)":"transparent";
    return`<div style="display:grid;grid-template-columns:140px 70px 70px 1fr 80px;padding:7px 12px;border-top:1px solid var(--border);align-items:center;background:${bg}"><span style="font-size:11px;font-weight:600;color:${team.color}">${team.name}</span><span style="font-size:11px;text-align:center;color:var(--stone)">${ss.length}</span><span style="font-size:11px;text-align:center;color:var(--stone)">${fo}</span><div style="display:flex;align-items:center;gap:7px"><div class="pct-bar-wrap"><div class="pct-bar" style="width:${Math.min(avg*20,100)}%;background:var(--red)"></div></div><span style="font-size:11px;font-weight:600;color:var(--red);white-space:nowrap">${avg>0?"-"+avg.toFixed(2):"clean"}</span></div><span style="font-size:11px;font-weight:700;text-align:right;color:${pyP!==null?pctCol(pyP):"var(--stone)"}">${pyP!==null?pyP+"%":"--"}</span></div>`;
  }).join("")}</div>`;
  h+=`<div style="font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:10px">pyramid hit rate comparison</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:20px">${TEAMS.map(team=>{const ss=getSessions(team.id).filter(s=>s.date);let pyH=0,pyT=0;ss.forEach(s=>{(s.fullouts||[]).forEach(fo=>{pyT++;if(fo.pyramidHit)pyH++;});});const pyP=pyT>0?Math.round((pyH/pyT)*100):null;return`<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px"><span style="font-size:11px;font-weight:500;width:130px;flex-shrink:0;color:${team.color}">${team.name}</span><div class="pct-bar-wrap" style="flex:1;height:7px">${pyP!==null?`<div class="pct-bar" style="width:${pyP}%;background:${pctCol(pyP)}"></div>`:""}</div><span style="font-size:11px;font-weight:700;width:38px;text-align:right;color:${pyP!==null?pctCol(pyP):"var(--stone)"}">${pyP!==null?pyP+"%":"--"}</span></div>`;}).join("")}</div>`;
  el.innerHTML=h;
}

startLiveSync();
</script>
</body>
</html>
