<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>EOD Allstars · Fullout Tracker</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0efed;--surface:#f7f6f4;--panel:#ebebea;
  --border:#d8d7d5;--border2:#c8c7c5;
  --stone:#8a8a88;--ink:#1a1a1a;--ink-lt:#4a4a48;
  --putty:#9a9a98;--red:#b33a2d;--white:#fafafa;
  --green:#2d7a52;--orange:#c47a1a;--pink:#c4559a;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--ink);}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;width:100%;flex:1;min-height:0;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}
.topbar{background:var(--ink);display:flex;align-items:center;padding:0 20px;height:56px;flex-shrink:0;gap:12px;}
.topbar-logo{height:44px;width:auto;}
.topbar-wordmark{font-family:'DM Serif Display',serif;font-size:21px;font-style:italic;color:#f0efed;}
.topbar-sub{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555;}
.sync-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;}
.sync-dot.ok{background:#4a9d6f;}.sync-dot.err{background:#b33a2d;}.sync-dot.busy{background:#c4a44a;animation:pulse 1s infinite;}
.sync-lbl{font-size:9px;color:#555;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.backbar{background:var(--ink);display:flex;align-items:center;padding:0 16px;height:44px;flex-shrink:0;gap:10px;}
.back-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:#666;padding:0;}
.back-btn:hover{color:#bbb;}
.backbar-title{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:#ccc;}
.backbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pill-btn{padding:5px 13px;background:transparent;border:1px solid #3a3a3a;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:#999;cursor:pointer;}
.pill-btn:hover,.pill-btn.dark{background:rgba(255,255,255,.09);border-color:#555;color:#ccc;}
.home-content{flex:1;overflow-y:auto;padding:28px 24px 60px;}
.teams-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.team-tile{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0;transition:all .15s;overflow:hidden;}
.team-tile:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.07);}
.team-tile img{width:100%;max-width:140px;height:auto;object-fit:contain;}
.team-abbr-fb{width:70px;height:70px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;font-style:italic;color:white;}
.all-tile{background:var(--ink);border:1px solid #2a2a2a;border-radius:14px;padding:20px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .15s;text-align:center;}
.all-tile:hover{background:#252525;transform:translateY(-2px);}
.all-icon{width:64px;height:64px;border-radius:50%;background:#222;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:24px;}
.all-name{font-size:11px;font-weight:600;color:#ddd;letter-spacing:1px;text-transform:uppercase;}
.all-sub{font-size:10px;color:#555;}
.team-body{flex:1;display:flex;min-height:0;overflow:hidden;}
.team-nav{width:190px;flex-shrink:0;background:var(--ink);padding:14px;display:flex;flex-direction:column;overflow-y:auto;}
.team-logo-sidebar{width:140px;margin:0 auto 16px;display:block;}
.team-nav-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#555;text-align:left;padding:9px 0;border-bottom:1px solid #222;width:100%;}
.team-nav-btn.active{color:#ccc;}
.team-content{flex:1;display:flex;min-height:0;overflow:hidden;}
.fo-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.fo-left{width:190px;flex-shrink:0;background:#111;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;border-right:1px solid #222;}
.fo-right{flex:1;background:var(--bg);overflow-y:auto;padding:18px 22px 60px;}
.fo-session-row{background:rgba(255,255,255,.04);border:1px solid #222;border-radius:8px;padding:9px 11px;cursor:pointer;margin-bottom:6px;}
.fo-session-row.active,.fo-session-row:hover{background:rgba(255,255,255,.1);border-color:#3a3a3a;}
.fo-session-date{font-family:'DM Serif Display',serif;font-size:13px;font-style:italic;color:#bbb;}
.fo-session-cnt{font-size:10px;color:#444;margin-top:2px;}
.add-fo-btn{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid #2a2a2a;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:#aaa;cursor:pointer;}
.fo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.fo-card-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);}
.fo-card-title{font-family:'DM Serif Display',serif;font-size:17px;font-style:italic;}
.fo-card-body{padding:14px;display:flex;flex-direction:column;gap:12px;}
.fo-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:5px;}
.fo-inp{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.fo-ta{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
.ded-row{display:flex;flex-direction:column;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);}
.ded-top{display:flex;align-items:center;gap:6px;}
.ded-tag{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--ink-lt);white-space:nowrap;}
.ded-pts{font-size:11px;font-weight:700;color:var(--red);}
.ded-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 6px;margin-left:auto;}
.ded-rem:hover{color:var(--red);}
.ded-desc{width:100%;padding:5px 8px;background:var(--panel);border:1px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink);outline:none;}
.ded-total{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--panel);border-top:1px solid var(--border);}
.add-ded-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--stone);cursor:pointer;}
.ded-menu{position:absolute;top:100%;left:0;z-index:200;background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:230px;overflow:hidden;margin-top:4px;}
.ded-menu-hd{padding:5px 12px;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);background:var(--panel);border-bottom:1px solid var(--border);}
.ded-menu-opt{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--ink);display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}
.ded-menu-opt:last-child{border-bottom:none;}
.ded-menu-opt:hover{background:var(--panel);}
.opt-pts{font-size:11px;font-weight:700;color:var(--red);}
.prob-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);}
.prob-item:last-child{border-bottom:none;}
.prob-chk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.prob-chk.done{background:var(--pink);border-color:var(--pink);}
.prob-chk.done::after{content:'';width:4px;height:8px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.prob-txt{flex:1;font-size:12px;color:var(--ink);}
.prob-item.done .prob-txt{text-decoration:line-through;color:var(--stone);}
.prob-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:10px;padding:2px 4px;margin-left:auto;}
.add-row{display:flex;gap:8px;margin-bottom:14px;}
.add-inp{flex:1;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.add-btn{padding:8px 14px;background:var(--ink);color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;}
.cl-item.done{opacity:.55;}
.chk-box{width:20px;height:20px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.chk-box.ticked{background:var(--pink);border-color:var(--pink);}
.chk-box.ticked::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.cl-text{flex:1;font-size:12px;line-height:1.4;}
.cl-item.done .cl-text{text-decoration:line-through;color:var(--stone);}
.cl-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 6px;}
.builder-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.builder-left{width:240px;flex-shrink:0;background:var(--ink);overflow-y:auto;}
.builder-right{flex:1;background:var(--surface);overflow-y:auto;}
.builder-left .lbl{color:#555;}
.prog-track{height:4px;background:#2a2a2a;border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;transition:width .3s;}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;color:#666;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.cat-chip{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:8px 4px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--ink-lt);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;line-height:1.2;}
.cat-chip.sel{background:var(--white);border-color:var(--ink);color:var(--ink);font-weight:600;}
.cat-ic{font-size:11px;color:var(--putty);}
.bsec{border:1px solid var(--border);border-radius:8px;padding:11px;display:flex;flex-direction:column;gap:9px;background:var(--white);margin-bottom:9px;}
.bsec-top{display:flex;justify-content:space-between;align-items:center;}
.bsec-lft{display:flex;align-items:center;gap:7px;}
.bsec-num{font-family:'DM Serif Display',serif;font-size:15px;font-style:italic;color:var(--putty);}
.bsec-lbl{font-size:12px;font-weight:600;}
.bsec-acts{display:flex;gap:4px;}
.ic-btn{width:24px;height:24px;background:var(--panel);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:9px;color:var(--stone);display:flex;align-items:center;justify-content:center;}
.ic-btn:disabled{opacity:.2;cursor:not-allowed;}
.ic-btn.danger{color:var(--red);}
.tchips{display:flex;flex-wrap:wrap;gap:4px;}
.tchip{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--ink-lt);cursor:pointer;}
.tchip.sel{background:var(--ink);border-color:var(--ink);color:white;font-weight:600;}
.dark-inp{width:100%;padding:8px 10px;background:#222;border:1px solid #3a3a3a;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:#ddd;outline:none;height:36px;}
.ta{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
.ta::placeholder{color:var(--stone);opacity:.6;}
.btn-outline{width:100%;padding:9px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;}
.btn-outline:disabled{opacity:.3;cursor:not-allowed;}
.lbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);display:block;}
.lbl-xs{font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);}
.panel{padding:18px;display:flex;flex-direction:column;gap:14px;}
.field-block{display:flex;flex-direction:column;gap:7px;}
.plan-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.plan-sidebar{width:210px;flex-shrink:0;background:var(--ink);overflow-y:auto;}
.plan-sidebar .lbl{color:#555;}
.plan-main{flex:1;background:var(--bg);overflow-y:auto;}
.plan-inner{padding:16px 18px 60px;display:flex;flex-direction:column;gap:12px;}
.attend-list{display:flex;flex-direction:column;gap:3px;margin-top:5px;}
.attend-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;cursor:pointer;user-select:none;border:1px solid transparent;}
.attend-item.on{background:#1e1e1e;border-color:#2e2e2e;}
.tick{width:14px;height:14px;border:1.5px solid #3a3a3a;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#666;font-weight:700;flex-shrink:0;}
.attend-item.on .tick{border-color:var(--pink);color:var(--pink);}
.aname{font-size:11px;color:#777;}
.attend-item.on .aname{color:#bbb;}
.plan-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.plan-block.active-timer{border-color:var(--pink);box-shadow:0 0 0 2px rgba(196,85,154,.2);}
.plan-block-hd{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;background:var(--panel);border-bottom:1px solid var(--border);}
.blk-lft{display:flex;align-items:center;gap:8px;}
.blk-num{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:var(--border2);}
.blk-title{font-size:13px;font-weight:600;}
.dur-tag{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);background:var(--white);border:1px solid var(--border);border-radius:100px;padding:2px 9px;}
.plan-block-body{display:flex;flex-direction:column;}
.plan-field{padding:8px 13px;border-bottom:1px solid var(--border);}
.plan-field:last-child{border-bottom:none;}
.plan-field-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:5px;}
.detail-text{font-size:12px;color:var(--ink-lt);line-height:1.5;}
.stunt-tbl{border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.stunt-tbl-hd{display:grid;grid-template-columns:1fr 64px 64px;padding:5px 10px;background:var(--panel);border-bottom:1px solid var(--border);}
.stunt-tbl-hd span{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:center;}
.stunt-tbl-hd span:first-child{text-align:left;}
.stunt-tbl-row{display:grid;grid-template-columns:1fr 64px 64px;align-items:center;padding:5px 10px;border-top:1px solid var(--border);}
.stunt-inp{width:54px;padding:4px 5px;background:var(--panel);border:1px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink);text-align:center;outline:none;display:block;margin:0 auto;}
.plan-ta{width:100%;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
.end-mark{text-align:center;padding:24px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--border);}
.analytics-body{flex:1;overflow-y:auto;padding:20px 24px 60px;}
.analytics-title{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;margin-bottom:3px;}
.analytics-sub{font-size:11px;color:var(--stone);margin-bottom:12px;}
.pct-bar-wrap{background:var(--border);border-radius:100px;height:5px;overflow:hidden;flex:1;min-width:40px;}
.pct-bar{height:100%;border-radius:100px;}
.fo-session-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.fo-session-card-hd{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--panel);border-bottom:1px solid var(--border);}
.fo-fo-hd{padding:6px 14px;background:var(--ink);color:#ddd;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #333;}
.fo-ded-line{padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-lt);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:4px 8px;}
.del-btn:hover{color:var(--red);}
.no-data{font-size:12px;color:var(--stone);font-style:italic;padding:8px 0;}
/* TIMER */
.timer-bar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid #2a2a2a;}
.timer-display{font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:white;min-width:80px;}
.timer-display.warning{color:#e8b84b;}
.timer-display.done{color:var(--pink);}
.timer-btn{padding:6px 14px;border:1px solid #3a3a3a;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:#999;background:transparent;cursor:pointer;}
.timer-btn:hover{background:rgba(255,255,255,.09);color:#ddd;}
.timer-btn.active{background:var(--pink);border-color:var(--pink);color:white;}
.timer-label{font-size:10px;color:#555;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.free-timer-inp{width:70px;padding:4px 8px;background:#222;border:1px solid #3a3a3a;border-radius:5px;font-family:'DM Serif Display',serif;font-size:16px;color:#ddd;text-align:center;outline:none;}
.section-timer-btn{padding:4px 10px;border:1px solid var(--border);border-radius:100px;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;color:var(--stone);background:transparent;cursor:pointer;white-space:nowrap;}
.section-timer-btn.running{background:var(--pink);border-color:var(--pink);color:white;}
.section-timer-countdown{font-size:11px;font-weight:700;color:var(--pink);min-width:40px;text-align:right;}
/* TERM CALENDAR */
.term-header{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--border);}
.cal-week-col{text-align:center;padding:5px 4px;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--stone);border-right:1px solid var(--border);}
.cal-dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.1);}
.cal-dot.green{background:#2d7a52;}
.cal-dot.orange{background:#c47a1a;}
.cal-dot.red{background:#b33a2d;}
.cal-dot.empty{background:var(--border);}
/* LAST SESSION NOTES */
.last-session-box{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;margin-bottom:4px;}
.last-session-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:5px;}
.last-session-text{font-size:11px;color:#666;line-height:1.5;font-style:italic;}
.last-session-date{font-size:9px;color:#444;margin-top:4px;}
/* PINK PANTHERS STUNT TRACKER */

// ── ALARM SOUND ──
function ensureAudio(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended")audioCtx.resume();
  }catch(e){}
}
// Unlock audio on first user interaction (required for iPad/desktop)
document.addEventListener("pointerdown",ensureAudio,{once:false,passive:true});

function playAlarm(){
  try{
    ensureAudio();if(!audioCtx)return;
    [0,300,600].forEach(delay=>{
      const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.frequency.value=880;osc.type="sine";
      gain.gain.setValueAtTime(0.4,audioCtx.currentTime+delay/1000);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+delay/1000+0.5);
      osc.start(audioCtx.currentTime+delay/1000);osc.stop(audioCtx.currentTime+delay/1000+0.5);
    });
  }catch(e){}
}

// ── SECTION TIMER ──
function startSectionTimer(secs,label,secId){
  stopSectionTimer();
  sectionTimerSecs=secs;sectionTimerSecId=secId;
  document.getElementById("section-timer-label").textContent=label;
  document.getElementById("section-stop-btn").style.display="inline-block";
  document.querySelectorAll(".plan-block").forEach(b=>b.classList.remove("active-timer"));
  const block=document.getElementById("sec-block-"+secId);if(block)block.classList.add("active-timer");
  // Update start buttons
  document.querySelectorAll(".section-timer-btn").forEach(b=>{b.textContent="start";b.classList.remove("running");});
  const btn=document.getElementById("sec-btn-"+secId);if(btn){btn.textContent="stop";btn.classList.add("running");}
  updateSectionDisplay();
  sectionTimerInterval=setInterval(()=>{
    sectionTimerSecs--;updateSectionDisplay();
    if(sectionTimerSecs<=0){stopSectionTimer();playAlarm();document.getElementById("section-timer-display").textContent="TIME!";document.getElementById("section-timer-display").className="timer-display done";}
  },1000);
}

function stopSectionTimer(){
  if(sectionTimerInterval){clearInterval(sectionTimerInterval);sectionTimerInterval=null;}
  document.querySelectorAll(".plan-block").forEach(b=>b.classList.remove("active-timer"));
  document.querySelectorAll(".section-timer-btn").forEach(b=>{b.textContent="start";b.classList.remove("running");});
  document.getElementById("section-stop-btn").style.display="none";
  document.getElementById("section-timer-label").textContent="";
}

function updateSectionDisplay(){
  const el=document.getElementById("section-timer-display");if(!el)return;
  el.textContent=fmtSecs(sectionTimerSecs);
  el.className="timer-display"+(sectionTimerSecs<=30?" warning":"");
}

function toggleSectionTimer(secs,label,secId){
  if(sectionTimerInterval&&sectionTimerSecId===secId){stopSectionTimer();document.getElementById("section-timer-display").textContent="--";}
  else{startSectionTimer(secs,label,secId);}
}

// ── FREE TIMER ──
function toggleFreeTimer(){
  if(freeTimerRunning){clearInterval(freeTimerInterval);freeTimerRunning=false;document.getElementById("free-timer-btn").textContent="start";document.getElementById("free-timer-btn").classList.remove("active");}
  else{
    const val=document.getElementById("free-timer-inp").value;
    freeTimerSecs=parseTimerInput(val);
    if(!freeTimerSecs)return;
    freeTimerRunning=true;
    document.getElementById("free-timer-btn").textContent="stop";
    document.getElementById("free-timer-btn").classList.add("active");
    updateFreeDisplay();
    freeTimerInterval=setInterval(()=>{
      freeTimerSecs--;updateFreeDisplay();
      if(freeTimerSecs<=0){clearInterval(freeTimerInterval);freeTimerRunning=false;playAlarm();document.getElementById("free-timer-display").textContent="TIME!";document.getElementById("free-timer-display").className="timer-display done";document.getElementById("free-timer-btn").textContent="start";document.getElementById("free-timer-btn").classList.remove("active");}
    },1000);
  }
}

function resetFreeTimer(){
  clearInterval(freeTimerInterval);freeTimerRunning=false;freeTimerSecs=0;
  document.getElementById("free-timer-btn").textContent="start";
  document.getElementById("free-timer-btn").classList.remove("active");

    listeners[t.id+"_fo"]=foCol(t.id).orderBy("date","desc").onSnapshot(snap=>{foCache[t.id]=snap.docs.map(d=>d.data());done++;if(done>=TEAMS.length)sd("home","ok","live");renderHome();},()=>sd("home","err","offline"));

  });
}

function calcStartTime(plan,secIndex){
  const team=getTeam(curTeamId);const t=team.templates[plan.templateId];
  if(!t||!t.time)return null;
  const match=t.time.match(/(\d+):(\d+)\s*(am|pm)/i);if(!match)return null;
  let h=parseInt(match[1]),m=parseInt(match[2]);const ampm=match[3].toLowerCase();
  if(ampm==="pm"&&h!==12)h+=12;if(ampm==="am"&&h===12)h=0;
  let totalMins=h*60+m;
  for(let i=0;i<secIndex;i++){totalMins+=parseInt(plan.sections[i]?.duration)||0;}
  const endMins=totalMins+(parseInt(plan.sections[secIndex]?.duration)||0);
  function fmt(mins){const hh=Math.floor(mins/60)%24;const mm=mins%60;const ap=hh>=12?"pm":"am";const h12=hh%12||12;return h12+":"+(mm<10?"0":"")+mm+" "+ap;}
  return fmt(totalMins)+" — "+fmt(endMins);
}

function getCoordWeeks(){
  // T2 W5 onwards (current week is W4, so show from W5)
  const weeks=[];
  const start=new Date("2026-05-11"); // W5 start
  for(let i=0;i<8;i++){
    const d=new Date(start);d.setDate(d.getDate()+i*7);
    const dd=String(d.getDate()).padStart(2,"0");
    const mm=String(d.getMonth()+1).padStart(2,"0");
    weeks.push({key:`w${5+i}`,label:`W${5+i}`,date:`${dd}/${mm}`});

}

function drawCoordPie(){
  const canvas=document.getElementById("coord-pie");if(!canvas)return;
  const total=parseInt(canvas.dataset.total)||0;
  const valsStr=canvas.dataset.vals||"";
  if(!total||!valsStr)return;
  const entries=valsStr.split(",").map(s=>{const p=s.split("|");return{v:parseInt(p[0]),c:p[1]};});
  const ctx=canvas.getContext("2d");
  const W=220,H=220,R=95,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  let angle=-Math.PI/2;
  entries.forEach(d=>{
    const sweep=(d.v/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+sweep);
    ctx.closePath();ctx.fillStyle=d.c;ctx.fill();
    ctx.strokeStyle="white";ctx.lineWidth=2;ctx.stroke();
    angle+=sweep;
  });
}

}

function calcTrend(sessions){
  if(sessions.length<2)return null;
  const p1=sessions[0].attempts>0?sessions[0].hits/sessions[0].attempts:0;
  const p2=sessions[1].attempts>0?sessions[1].hits/sessions[1].attempts:0;
  const diff=p1-p2;
  if(diff>0.05)return{arrow:"↑ improving",cls:"trend-up"};
  if(diff<-0.05)return{arrow:"↓ dropping",cls:"trend-down"};
  return{arrow:"→ steady",cls:"trend-flat"};
}

function ppHit(){
  ensureAudio(); // unlock audio context now (we're inside a user gesture)
  ppSessionData.hits=(ppSessionData.hits||0)+1;
  ppSessionData.attempts=Math.max(ppSessionData.attempts||0,ppSessionData.hits);
  updatePPDisplay();
  // Fire celebration the moment we cross into 100% (not on every hit while staying at 100%).
  // Re-arms when ppSessionData.celebrated gets reset by ppAdjust dropping below 100%.
  const at100=ppSessionData.attempts>0&&ppSessionData.hits===ppSessionData.attempts;
  if(at100&&!ppSessionData.celebrated){
    ppSessionData.celebrated=true;
    launchConfetti();
  }
}

function ppAdjust(field,delta){
  ensureAudio();
  ppSessionData[field]=Math.max(0,(ppSessionData[field]||0)+delta);
  if(ppSessionData.hits>ppSessionData.attempts)ppSessionData.hits=ppSessionData.attempts;
  // If the user adjusts and we're no longer at 100%, re-arm the celebration so it can fire again next time.
  const at100=ppSessionData.attempts>0&&ppSessionData.hits===ppSessionData.attempts;
  if(!at100)ppSessionData.celebrated=false;
  updatePPDisplay();
}

function updatePPDisplay(){
  const atts=ppSessionData.attempts||0;
  const hits=ppSessionData.hits||0;
  const pct=atts>0?Math.round((hits/atts)*100):null;
  const pctColor=pct!==null?pctCol(pct):"var(--stone)";
  const rateEl=document.getElementById("pp-rate");
  const subEl=document.getElementById("pp-rate-sub");
  const attsEl=document.getElementById("pp-atts-num");
  const hitsEl=document.getElementById("pp-hits-num");
  if(rateEl)rateEl.textContent=pct!==null?pct+"%":"--";
  if(rateEl)rateEl.style.color=pctColor;
  if(subEl)subEl.textContent=hits+" hits / "+atts+" attempts";
  if(attsEl)attsEl.textContent=atts;
  if(hitsEl)hitsEl.textContent=hits;
}

function launchConfetti(){
  const colors=["#e91e8c","#9b59b6","#f1c40f","#2ecc71","#3498db","#e74c3c","#ff9800"];
  // Play a fun ascending sound (audio context unlocked via ensureAudio)
  try{
    ensureAudio();
    if(audioCtx){
      [0,100,200,300,400].forEach((delay,i)=>{
        const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
        osc.connect(gain);gain.connect(audioCtx.destination);
        osc.frequency.value=[523,659,784,1047,1319][i];osc.type="sine";
        gain.gain.setValueAtTime(0.3,audioCtx.currentTime+delay/1000);
        gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+delay/1000+0.3);
        osc.start(audioCtx.currentTime+delay/1000);osc.stop(audioCtx.currentTime+delay/1000+0.3);
      });
    }
  }catch(e){}
  for(let i=0;i<80;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?"50%":"2px"};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

// ── PINK PANTHERS TEAM STATS ──
let ppStatsFilter="today"; // today | week | total | fullout

function ppFilterSessions(sessions,filter){
  if(!sessions||!sessions.length)return[];
  const today=new Date().toISOString().split("T")[0];
  if(filter==="today")return sessions.filter(s=>s.date===today);
  if(filter==="week"){
    const d=new Date();d.setDate(d.getDate()-7);
    const cutoff=d.toISOString().split("T")[0];
    return sessions.filter(s=>s.date>=cutoff);
  }
  if(filter==="fullout")return sessions.filter(s=>s.isFullout);
  return sessions; // total
}

// Determine which group(s) get the crown for a given stunt.
// Rule: highest hit %; tie-break by most attempts that hit (i.e. raw hits); if still tied, all winners get crowns.
// Groups with 0 attempts in the period are excluded from crown contention.
function ppCrownWinners(rows){
  const eligible=rows.filter(r=>r.atts>0);
  if(!eligible.length)return new Set();
  const maxPct=Math.max(...eligible.map(r=>r.pct));
  const topByPct=eligible.filter(r=>r.pct===maxPct);
  const maxHits=Math.max(...topByPct.map(r=>r.hits));
  const winners=topByPct.filter(r=>r.hits===maxHits);
  return new Set(winners.map(r=>r.groupId));
}

// ── PINK PANTHERS FULLOUT ──
// Build the unique flyer list across all stunts (preserves first-occurrence order: pp_s1's order).
function ppAllFlyers(){
  const team=getTeam("pink_panthers");
  const seen=new Set();const out=[];
  (team.ppStunts||[]).forEach(st=>(st.groups||[]).forEach(g=>{if(!seen.has(g.name)){seen.add(g.name);out.push(g.name);}}));
  return out;
}
// Is this flyer in this stunt's groups?
function ppFlyerInStunt(flyer,stunt){return(stunt.groups||[]).some(g=>g.name===flyer);}

function ppFoCellKey(flyer,stuntId){return flyer.toLowerCase()+"__"+stuntId;}

function ppFoGetCurrent(){
  // Default to today's fullout. If no doc exists yet, return a fresh empty one.
  const date=ppFoCurDate||new Date().toISOString().split("T")[0];
  return ppFoCache[date]||{date,cells:{}};
}

function ppFoCellTotalDeduction(cell){
  if(!cell||cell.status!=="not_hit"||!cell.deductions)return 0;
  return cell.deductions.reduce((a,id)=>a+ppDeductValue(id),0);
}

function ppFoTotalDeduction(fo){
  if(!fo)return 0;
  let total=0;
  if(fo.cells)Object.values(fo.cells).forEach(c=>{total+=ppFoCellTotalDeduction(c);});
  if(fo.tumbling)fo.tumbling.forEach(t=>{total+=(t.value||0.25);});
  return Math.round(total*100)/100;
}

async function ppFoSetCell(flyer,stuntId,update){
  const date=ppFoCurDate||new Date().toISOString().split("T")[0];
  const cur=ppFoCache[date]||{date,cells:{}};
  const key=ppFoCellKey(flyer,stuntId);
  if(update===null||update===undefined){delete cur.cells[key];}
  else{cur.cells[key]=update;}
  cur.updated_at=new Date().toISOString();
  ppFoCache[date]=cur; // optimistic local update
  // Re-render immediately so the user sees instant feedback (don't wait for the snapshot round-trip)
  if(curTeamTab==="pp_fullout"&&!ppFoPopup)renderTeamTab();
  try{await ppFoCol().doc(date).set(cur);}catch(e){console.error("Failed to save fullout cell:",e);}
}

function ppFoOnHit(flyer,stuntId){
  ensureAudio();
  ppFoSetCell(flyer,stuntId,{status:"hit",updated_at:new Date().toISOString()});
  launchConfetti();
}

function ppFoOnMiss(flyer,stuntId){
  // Open the deductions popup. If the cell already has data, pre-populate with existing selections.
  const fo=ppFoGetCurrent();
  const existing=fo.cells[ppFoCellKey(flyer,stuntId)];
  const preselected=(existing&&existing.status==="not_hit"&&existing.deductions)?existing.deductions:[];
  ppFoPopup={kind:"cell-deductions",flyer,stuntId,deductions:new Set(preselected)};
  ppFoRenderPopup();
}

function ppFoClearCell(flyer,stuntId){
  ppFoSetCell(flyer,stuntId,null);
}

function ppFoNewFullout(){
  if(!confirm("Start a new fullout? This clears all the cells for today."))return;
  const date=ppFoCurDate||new Date().toISOString().split("T")[0];
  const fresh={date,cells:{},tumbling:[],updated_at:new Date().toISOString()};
  ppFoCache[date]=fresh;
  if(curTeamTab==="pp_fullout")renderTeamTab();
  ppFoCol().doc(date).set(fresh).catch(e=>console.error("Failed to reset fullout:",e));
}

async function ppFoAddTumbling(name,description){
  const date=ppFoCurDate||new Date().toISOString().split("T")[0];
  const cur=ppFoCache[date]||{date,cells:{},tumbling:[]};
  if(!cur.tumbling)cur.tumbling=[];
  cur.tumbling.push({id:uid(),name:name.trim(),description:description.trim(),value:0.25});
  cur.updated_at=new Date().toISOString();
  ppFoCache[date]=cur;
  if(curTeamTab==="pp_fullout"&&!ppFoPopup)renderTeamTab();
  try{await ppFoCol().doc(date).set(cur);}catch(e){console.error("Failed to save tumbling:",e);}
}

async function ppFoRemoveTumbling(tumblingId){
  const date=ppFoCurDate||new Date().toISOString().split("T")[0];
  const cur=ppFoCache[date];
  if(!cur||!cur.tumbling)return;
  cur.tumbling=cur.tumbling.filter(t=>t.id!==tumblingId);
  cur.updated_at=new Date().toISOString();
  ppFoCache[date]=cur;
  if(curTeamTab==="pp_fullout"&&!ppFoPopup)renderTeamTab();
  try{await ppFoCol().doc(date).set(cur);}catch(e){console.error("Failed to remove tumbling:",e);}
}

            <div>
              <label style="font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);display:block;margin-bottom:6px">What happened</label>
              <input id="pp-tumb-desc" type="text" placeholder="e.g. didn't land back tuck" autocomplete="off" style="width:100%;padding:11px 12px;background:#faf8fa;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none"/>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:linear-gradient(135deg,#fff4f2,#ffe7e3);border:1px solid #e8b8b0;border-radius:9px">
              <div style="font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">Deduction</div>
              <div style="font-family:'DM Serif Display',serif;font-size:22px;font-style:italic;color:#b33a2d;font-weight:600;line-height:1">−0.25</div>
            </div>
          </div>
        </div>
        <div class="pp-popup-foot">
          <button type="button" class="pp-popup-btn-cancel" data-pp-popup-action="cancel">Cancel</button>
          <button type="button" class="pp-popup-btn-save" data-pp-popup-action="save-tumbling">Save −0.25</button>
        </div>
      </div>
    </div>`;
    // Auto-focus the name field for fast entry
    setTimeout(()=>{const n=document.getElementById("pp-tumb-name");if(n)n.focus();},50);
  }

  // Single delegated handler — the click bug fix:
  // Previously had `onclick="event.stopPropagation()"` on the popup card which blocked all clicks
  // inside from reaching this handler. Now we just check whether the click was on an action element
  // OR on the bare backdrop (= dismiss).
  const backdrop=mount.querySelector(".pp-popup-backdrop");
  if(!backdrop)return;
  backdrop.addEventListener("click",e=>{
    const t=e.target.closest("[data-pp-popup-action]");
    if(t){
      const action=t.getAttribute("data-pp-popup-action");
      const id=t.getAttribute("data-pp-popup-id");
      if(action==="cancel"){ppFoPopup=null;ppFoRenderPopup();return;}
      if(ppFoPopup.kind==="cell-deductions"){
        const{flyer,stuntId,deductions}=ppFoPopup;
        if(action==="toggle-deduct"){
          if(deductions.has(id))deductions.delete(id);else deductions.add(id);
          ppFoRenderPopup();
        }else if(action==="noperf"){
          // Clear popup FIRST so the cell-update's re-render check (!ppFoPopup) passes
          // and the grid actually refreshes to show the new state.
          ppFoPopup=null;
          ppFoSetCell(flyer,stuntId,{status:id,updated_at:new Date().toISOString()});
        }else if(action==="save"){
          if(deductions.size===0)return;
          ppFoPopup=null;
          ppFoSetCell(flyer,stuntId,{status:"not_hit",deductions:[...deductions],updated_at:new Date().toISOString()});
        }
      }else if(ppFoPopup.kind==="tumbling-add"){
        if(action==="save-tumbling"){
          const nameEl=document.getElementById("pp-tumb-name");
          const descEl=document.getElementById("pp-tumb-desc");
          const name=(nameEl&&nameEl.value||"").trim();
          const desc=(descEl&&descEl.value||"").trim();
          if(!name){alert("Please enter an athlete name.");if(nameEl)nameEl.focus();return;}
          if(!desc){alert("Please describe what happened.");if(descEl)descEl.focus();return;}
          ppFoPopup=null;
          ppFoAddTumbling(name,desc);
        }
      }
      return;
    }
    // Click outside any action element — if it landed on the bare backdrop (not the popup card), dismiss
    if(e.target===backdrop){ppFoPopup=null;ppFoRenderPopup();}
  });
}

// ── CHECKLIST ──
function renderChecklistView(container){
  container.innerHTML=`<div style="flex:1;overflow-y:auto;padding:20px 24px 60px"><div style="font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--stone);margin-bottom:12px">problems / things to fix</div><div class="add-row"><input class="add-inp" id="cl-inp" placeholder="Add a problem..." onkeydown="if(event.key==='Enter')addCLItem()"/><button class="add-btn" onclick="addCLItem()">+ add</button></div><div id="cl-list"></div></div>`;
  renderCLList();
}
function renderCLList(){const list=document.getElementById("cl-list");if(!list)return;const items=clCache[curTeamId]||[];if(!items.length){list.innerHTML='<div class="no-data">No items yet.</div>';return;}list.innerHTML=items.map(item=>`<div class="cl-item${item.done?" done":""}"><div class="chk-box${item.done?" ticked":""}" onclick="toggleCL('${item.id}')"></div><span class="cl-text">${esc(item.text)}</span><button class="cl-rem" onclick="removeCL('${item.id}')">x</button></div>`).join("");}
async function addCLItem(){const inp=document.getElementById("cl-inp");const txt=inp.value.trim();if(!txt)return;inp.value="";const id=uid();await clCol(curTeamId).doc(id).set({id,text:txt,done:false,created_at:new Date().toISOString()});}
async function toggleCL(id){const i=(clCache[curTeamId]||[]).find(x=>x.id===id);if(!i)return;i.done=!i.done;await clCol(curTeamId).doc(id).set(i);}
async function removeCL(id){if(!confirm("Remove?"))return;await clCol(curTeamId).doc(id).delete();}

// ── TEAM ANALYTICS ──
function renderTeamAnalytics(container){
  const sessions=foCache[curTeamId]||[];const team=getTeam(curTeamId);
  let totalFo=0;sessions.forEach(s=>{if(s.fullouts)totalFo+=s.fullouts.length;});
  let html=`<div style="flex:1;overflow-y:auto;padding:20px 24px 60px">`;
  html+=`<div class="analytics-title">stunt group hit rates</div><div class="analytics-sub">across ${totalFo} fullouts — absent groups excluded</div>`;
  if(totalFo&&team.stunts){
    const allAthletes=[...new Set((team.stunts||[]).flatMap(s=>s.athletes))];
    html+=`<table style="width:100%;border:1px solid var(--border);border-radius:10px;border-collapse:collapse;overflow:hidden;margin-bottom:18px"><thead><tr style="background:var(--ink)"><th style="padding:6px 10px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:white;text-align:left">group</th>${(team.stunts||[]).map(s=>`<th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white">${esc(s.label)}</th>`).join("")}${team.stunts.length>1?`<th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white;background:#111">combined</th>`:""}</tr></thead><tbody>${allAthletes.map(name=>{
      let cells="";let totalH=0,totalT=0;
      (team.stunts||[]).forEach(stunt=>{
        if(!stunt.athletes.includes(name)){cells+=`<td colspan="2" style="padding:6px 8px;text-align:center;font-size:10px;color:var(--stone)">n/a</td>`;return;}
        let h=0,t=0;
        sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{const abs=fo[stunt.id+"Absent"]&&fo[stunt.id+"Absent"][name];if(!abs){t++;if(fo[stunt.id+"Hits"]&&fo[stunt.id+"Hits"][name])h++;}});});
        const p=t>0?Math.round((h/t)*100):null;totalH+=h;totalT+=t;
        cells+=`<td style="padding:6px 8px;text-align:center;font-size:11px">${h}/${t}</td><td style="padding:6px 8px;min-width:80px"><div style="display:flex;align-items:center;gap:4px"><div class="pct-bar-wrap"><div class="pct-bar" style="width:${p||0}%;background:${p!==null?pctCol(p):"var(--border)"}"></div></div><span style="font-size:10px;font-weight:700;color:${p!==null?pctCol(p):"var(--stone)"}">${p!==null?p+"%":"--"}</span></div></td>`;
      });
      if(team.stunts.length>1){const pC=totalT>0?Math.round((totalH/totalT)*100):null;cells+=`<td style="padding:6px 8px;text-align:center;font-size:11px">${totalH}/${totalT}</td><td style="padding:6px 8px;min-width:80px"><div style="display:flex;align-items:center;gap:4px"><div class="pct-bar-wrap"><div class="pct-bar" style="width:${pC||0}%;background:${pC!==null?pctCol(pC):"var(--border)"}"></div></div><span style="font-size:10px;font-weight:700;color:${pC!==null?pctCol(pC):"var(--stone)"}">${pC!==null?pC+"%":"--"}</span></div></td>`;}
      return`<tr style="border-top:1px solid var(--border)"><td style="padding:6px 10px;font-size:11px;font-weight:500">${esc(name)}'s group</td>${cells}</tr>`;
    }).join("")}</tbody></table>`;
  } else html+='<div class="no-data">No fullout data yet.</div>';
  let pyH=0,pyT=0;sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{pyT++;if(fo.pyramidHit)pyH++;});});
  if(pyT>0){const pyP=Math.round((pyH/pyT)*100);html+=`<div class="analytics-title" style="margin-top:16px">pyramid hit rate</div><div class="analytics-sub">${pyH}/${pyT} fullouts</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:16px;margin-bottom:18px"><div class="pct-bar-wrap" style="flex:1;height:8px"><div class="pct-bar" style="width:${pyP}%;background:${pctCol(pyP)}"></div></div><span style="font-size:22px;font-weight:700;color:${pctCol(pyP)}">${pyP}%</span></div>`;}
  html+=`<div class="analytics-title">deductions over time</div><div class="analytics-sub">per session, broken down by fullout</div>`;
  const sorted=[...sessions].filter(s=>s.date).sort((a,b)=>a.date.localeCompare(b.date));
  html+=sorted.map(s=>{const tot=s.fullouts?s.fullouts.reduce((sum,fo)=>sum+(fo.deductions?fo.deductions.reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0):0),0):0;return`<div class="fo-session-card"><div class="fo-session-card-hd"><span style="font-family:'DM Serif Display',serif;font-size:15px;font-style:italic">${fmtShort(s.date)}</span><span style="font-size:13px;font-weight:700;color:${tot>0?"var(--red)":"#4a9d6f"}">${tot>0?"-"+tot.toFixed(2):"clean"}</span></div>${s.fullouts&&s.fullouts.length?s.fullouts.map((fo,fi)=>{const foDed=fo.deductions?fo.deductions.reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0):0;return`<div class="fo-fo-hd">fullout ${String(fi+1).padStart(2,"00")} — ${foDed>0?"-"+foDed.toFixed(2):"no deductions"}</div>${fo.deductions&&fo.deductions.length?fo.deductions.map(d=>`<div class="fo-ded-line"><span style="color:var(--red);font-weight:600">-${parseFloat(d.pts||d.points).toFixed(2)}</span> ${esc(d.label)}${d.desc?` <span style="color:var(--stone)">&#8212; ${esc(d.desc)}</span>`:""}</div>`).join(""):'<div class="fo-ded-line" style="color:var(--stone)">No deductions</div>'}`; }).join(""):""}`;}).join("")+"</div>";
  html+="</div>";container.innerHTML=html;
}

// ── ALL TEAMS ANALYTICS (TERM CALENDAR) ──
function openAllAnalytics(){showScreen("all-analytics");renderAllAnalytics();}
function getSessionDots(sessions,weekStart,weekEnd,dayIndex){
  // Returns array of dot colors, one per fullout for that training day
  const weekSessions=sessions.filter(s=>{if(!s.date)return false;const d=new Date(s.date+"T12:00:00");return d>=weekStart&&d<=weekEnd;}).sort((a,b)=>a.date.localeCompare(b.date));
  const s=weekSessions[dayIndex];
  if(!s||!s.fullouts||!s.fullouts.length)return[];
  return s.fullouts.map(fo=>{
    const ded=fo.deductions?fo.deductions.reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0):0;
    if(ded===0)return"green";
    if(ded<=1)return"orange";
    return"red";
  });
}

function renderAllAnalytics(){
  const el=document.getElementById("all-analytics-content");
  // Group weeks by term
  const terms={};
  TERM_WEEKS.forEach(w=>{if(!terms[w.term])terms[w.term]=[];terms[w.term].push(w);});

  let html=`<div class="analytics-title">all teams — term calendar</div><div class="analytics-sub">green = clean · orange = ≤1pt deductions · red = >1pt deductions</div>`;

  Object.entries(terms).forEach(([termName,weeks])=>{
    html+=`<div style="margin-bottom:24px"><div style="font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:8px">${esc(termName)}</div>`;
    html+=`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">`;
    // Header row
    html+=`<div style="display:grid;grid-template-columns:140px ${weeks.map(()=>"1fr").join(" ")};background:var(--panel);border-bottom:1px solid var(--border)">`;
    html+=`<div style="padding:6px 10px;font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">team</div>`;
    weeks.forEach(w=>{
      const d=new Date(w.startDate);
      const dd=String(d.getDate()).padStart(2,"0");
      const mm=String(d.getMonth()+1).padStart(2,"0");
      html+=`<div class="cal-week-col" style="line-height:1.3">W${w.week}<br/><span style="font-size:7px;color:var(--stone);font-weight:400">${dd}/${mm}</span></div>`;
    });
    html+=`</div>`;
    // Team rows
    TEAMS.forEach((team,ti)=>{
      const sessions=foCache[team.id]||[];
      const bg=ti%2===0?"var(--surface)":"transparent";
      html+=`<div style="display:grid;grid-template-columns:140px ${weeks.map(()=>"1fr").join(" ")};align-items:center;border-top:1px solid var(--border);background:${bg}">`;
      html+=`<div style="padding:6px 10px;font-size:11px;font-weight:500;cursor:pointer;color:var(--ink)" onclick="openTeam('${team.id}')">${esc(team.name)}</div>`;
      weeks.forEach(w=>{
        const weekEnd=new Date(w.startDate);weekEnd.setDate(weekEnd.getDate()+6);
        const dots1=getSessionDots(sessions,w.startDate,weekEnd,0);
        const dots2=getSessionDots(sessions,w.startDate,weekEnd,1);
        const renderDots=dots=>dots.length?dots.map(c=>`<div class="cal-dot ${c}"></div>`).join(""):`<div class="cal-dot empty"></div>`;
        html+=`<div style="display:flex;justify-content:center;align-items:center;gap:3px;padding:5px 4px;border-right:1px solid var(--border)">${renderDots(dots1)}<div style="width:1px;height:10px;background:var(--border2);margin:0 2px;flex-shrink:0"></div>${renderDots(dots2)}</div>`;
      });
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });

  // Summary table
  html+=`<div class="analytics-title" style="margin-top:20px">program overview</div><div class="analytics-sub">season summary per team</div>`;
  html+=`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden"><div style="display:grid;grid-template-columns:160px 80px 80px 1fr 80px;background:var(--panel);padding:7px 14px;border-bottom:1px solid var(--border)"><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">team</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:center">sessions</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:center">fullouts</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone)">avg deductions</span><span style="font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--stone);text-align:right">pyramid%</span></div>`;
  TEAMS.forEach((team,i)=>{
    const sessions=foCache[team.id]||[];const totalFo=sessions.reduce((s,x)=>s+(x.fullouts?x.fullouts.length:0),0);
    const totalDed=sessions.reduce((sum,s)=>sum+(s.fullouts?s.fullouts.reduce((a,fo)=>a+(fo.deductions?fo.deductions.reduce((x,d)=>x+(parseFloat(d.pts||d.points)||0),0):0),0):0),0);
    const avgDed=sessions.length>0?(totalDed/sessions.length):0;
    let pyH=0,pyT=0;sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{pyT++;if(fo.pyramidHit)pyH++;});});
    const pyP=pyT>0?Math.round((pyH/pyT)*100):null;
    const bg=i%2===0?"var(--surface)":"transparent";
    html+=`<div style="display:grid;grid-template-columns:160px 80px 80px 1fr 80px;padding:8px 14px;border-top:1px solid var(--border);align-items:center;background:${bg}"><span style="font-size:12px;font-weight:500;cursor:pointer;color:var(--ink)" onclick="openTeam('${team.id}')">${esc(team.name)}</span><span style="font-size:12px;color:var(--stone);text-align:center">${sessions.length}</span><span style="font-size:12px;color:var(--stone);text-align:center">${totalFo}</span><div style="display:flex;align-items:center;gap:8px"><div class="pct-bar-wrap" style="max-width:120px"><div class="pct-bar" style="width:${Math.min((avgDed/5)*100,100)}%;background:${avgDed>1?"var(--red)":avgDed>0?"var(--orange)":"var(--green)"}"></div></div><span style="font-size:12px;font-weight:600;color:${avgDed>0?"var(--red)":"#4a9d6f"}">${avgDed>0?"-"+avgDed.toFixed(2):"clean"}</span></div><span style="font-size:12px;font-weight:700;text-align:right;color:${pyP!==null?pctCol(pyP):"var(--stone)"}">${pyP!==null?pyP+"%":"--"}</span></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

renderHome();
